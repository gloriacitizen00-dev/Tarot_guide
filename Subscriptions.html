<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Suscripciones</title>
  <style>
    body {
      background-color: #fdf5e6; /* crema */
      font-family: 'Georgia', serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    .subscription-block {
      display: inline-block;
      width: 30%;
      margin: 20px;
      padding: 20px;
      background-color: #fdf5e6;
      border: 2px solid #d3c4a3;
      border-radius: 10px;
    }
    button {
      background-color: #fdf5e6;
      border: 1px solid #bfa98a;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #e8dcc4;
    }
  </style>
</head>
<body>
  <h1>Elige tu camino</h1>
  <div class="subscription-block">
    <h2>Beginner</h2>
    <p>Explora los primeros pasos.</p>
    <button>Prueba gratis 7 días</button>
  </div>
  <div class="subscription-block">
    <h2>Intermediate</h2>
    <p>Profundiza en tus rituales.</p>
    <button>Suscribirse</button>
  </div>
  <div class="subscription-block">
    <h2>Advanced</h2>
    <p>Acceso completo y comunidad.</p>
    <button>Suscribirse</button>
  </div>
</body>
</html>
