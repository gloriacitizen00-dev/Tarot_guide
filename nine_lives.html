<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Nine Lives Spread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Bodoni Moda', serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      background: #ffffff;
      color: #000000;
      padding-top: 40px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 60px;
      margin-bottom: 10px;
      color: #000000;
    }

    .instructions {
      font-size: 1.2em;
      max-width: 800px;
      margin: 10px auto 30px auto;
      line-height: 1.6;
    }

    .row-name {
      font-size: 1.1em;
      font-weight: bold;
      margin-bottom: 8px;
      color: #000000;
    }

    .row { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      margin-bottom: 25px; 
      flex-wrap: wrap;
    }

    .card { 
      width: 120px; 
      text-align: center; 
    }

    .card img { 
      width: 120px; 
      height: 180px; 
      object-fit: cover; 
      border-radius: 8px;
      border: 2px solid gold;
      background: #000000;
    }

    .card-name { 
      margin-top: 6px; 
      font-weight: bold; 
      font-size: 0.9em; 
      color: #000000;
    }

    .text-area { 
      max-width: 700px; 
      margin: 20px auto; 
      font-size: 1.1em; 
      color: #000000; 
      min-height: 60px;
    }

    .buttons { 
      display: flex; 
      justify-content: center; 
      gap: 20px; 
      margin-top: 25px; 
      flex-wrap: nowrap;
    }

    .btn { 
      flex: 0 0 auto;
      padding: 18px 40px;
      font-size: 1.2em;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      color: white;
      background-color: #000000;
      transition: all 0.25s ease;
    }

    .btn:hover {
      background-color: #333333;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {
      .card { width: 100px; height: auto; }
      .card img { width: 100px; height: 150px; }
    }

    @media (max-width: 480px) {
      body { background-size: 100% auto; }
      .btn { flex: 1 1 100%; }
    }
  </style>
</head>
  <body>

    <h1>Nine Lives Spread</h1>
  
  
  <div class="row-name">Celestial Situation</div>
  <div class="row" id="top-row"></div>

  <div class="row-name">Stellar Decisions</div>
  <div class="row" id="middle-row"></div>

  <div class="row-name">Cosmic Outcome</div>
  <div class="row" id="bottom-row"></div>

  <div class="text-area" id="interpretation">
    The cards await your connection...
  </div>

  <script>
    // --- Cards Data ---
    const MajorArcana = [
      {name:"The Fool", src:"images/MajorArcana/TheFool.png"},
      {name:"The Magician", src:"images/MajorArcana/TheMagician.png"},
      {name:"The High Priestess", src:"images/MajorArcana/TheHighPriestess.png"},
      {name:"The Empress", src:"images/MajorArcana/TheEmpress.png"},
      {name:"The Emperor", src:"images/MajorArcana/TheEmperor.png"},
      {name:"The Hierophant", src:"images/MajorArcana/TheHierophant.png"},
      {name:"The Lovers", src:"images/MajorArcana/TheLovers.png"},
      {name:"The Chariot", src:"images/MajorArcana/TheChariot.png"},
      {name:"The Strength", src:"images/MajorArcana/TheStrength.png"},
      {name:"The Hermit", src:"images/MajorArcana/TheHermit.png"},
      {name:"The Wheel of Fortune", src:"images/MajorArcana/TheWheelofFortune.png"},
      {name:"The Justice", src:"images/MajorArcana/TheJustice.png"},
      {name:"The Hanged Man", src:"images/MajorArcana/TheHangedMan.png"},
      {name:"The Death", src:"images/MajorArcana/TheDeath.png"},
      {name:"The Temperance", src:"images/MajorArcana/TheTemperance.png"},
      {name:"The Devil", src:"images/MajorArcana/TheDevil.png"},
      {name:"The Tower", src:"images/MajorArcana/TheTower.png"},
      {name:"The Star", src:"images/MajorArcana/TheStar.png"},
      {name:"The Moon", src:"images/MajorArcana/TheMoon.png"},
      {name:"The Sun", src:"images/MajorArcana/TheSun.png"},
      {name:"The Judgement", src:"images/MajorArcana/TheJudgement.png"},
      {name:"The World", src:"images/MajorArcana/TheWorld.png"}
    ];

    const Cups = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Cups`, src:`images/Cups/${n}OfCups.png`}));
    const Pentacles = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Pentacles`, src:`images/pentacles/${n}OfPentacles.png`}));
    const Swords = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Swords`, src:`images/swords/${n}OfSwords.png`}));
    const Wands = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Wands`, src:`images/wands/${n}OfWands.png`}));

    const minorArcana = [...Cups, ...Pentacles, ...Swords, ...Wands];

    function shuffle(array){
      for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    const params = new URLSearchParams(window.location.search);
    const deckChoice = (params.get("deck") || "mixed").toLowerCase();

    let deck;
    if(deckChoice === "major") deck = [...MajorArcana];
    else if(deckChoice === "minor") deck = [...minorArcana];
    else deck = [...MajorArcana, ...minorArcana];

    deck = shuffle(deck).slice(0,9);

    const topRow = document.getElementById("top-row");
    const middleRow = document.getElementById("middle-row");
    const bottomRow = document.getElementById("bottom-row");
    window.onload = () => {
  interpretation.innerText = generateInterpretation();
};

    deck.forEach((card,index) => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<img src="${card.src}" alt="${card.name}"><div class="card-name">${card.name}</div>`;
      if(index < 4) topRow.appendChild(div);
      else if(index < 7) middleRow.appendChild(div);
      else bottomRow.appendChild(div);
    });

    // --- Random interpretation generator ---
    const openings = [
      "The energy surrounding your path reveals",
      "The cosmos whispers that",
      "A hidden force suggests",
      "The tarot shows that"
    ];
    const middles = [
      "consider carefully your next steps",
      "unexpected opportunities may arise",
      "your intuition guides you toward clarity",
      "the alignment of stars points to insight"
    ];
    const closings = [
      "Reflect and embrace the message.",
      "Let the guidance settle within you.",
      "Observe how this insight resonates.",
      "Trust the universe's gentle nudges."
    ];


  // --- Random interpretation generator ---
  function generateInterpretation() {
    const rand = arr => arr[Math.floor(Math.random() * arr.length)];
    return `${rand(openings)}, ${rand(middles)}. ${rand(closings)}`;
  }

  // Show the interpretation text
  interpretation.innerText = generateInterpretation();
</script>

<!-- Prompt for the user -->
<p class="instructions">Would you like to continue exploring?</p>

<div class="buttons">
  <button class="btn" onclick="navigate(true)">Yes</button>
  <button class="btn" onclick="navigate(false)">No</button>
</div>

<script>
  // Navigation function
  function navigate(choice) {
    if (choice) {
      window.location.href = "shopping.html";   // Store
    } else {
      window.location.href = "Spreads.html";    // Back to spread selection
    }
  }
</script>
</body>
</html>
