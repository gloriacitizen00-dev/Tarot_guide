<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Registration ✨</title>
  <style>
    body { 
      font-family: 'Bodoni Moda', serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      text-align: center;
      background: linear-gradient(135deg, #6a0dad, #b57edc, #4b0082);
      background-attachment: fixed;
      color: #4b1d73;
      padding-top: 40px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 60px;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(255,255,255,0.6);
    }

    .register-box {
      background: rgba(255,255,255,0.85);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      width: 350px;
    }

    .register-box label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      color: #2b0a44;
    }

    .register-box input, 
    .register-box select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .register-box button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background-color: #b57edc; /* morado claro */
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }
    .register-box button:hover {
      background-color: #9b59b6;
    }

    .menu-button {
      display:inline-block; 
      padding:10px 20px; 
      background-color:#b57edc; 
      color:#fff; 
      font-weight:bold;
      text-decoration:none; 
      border-radius:8px; 
      font-family:'Cinzel', serif; 
      font-size:16px;
      box-shadow: 0 0 10px rgba(255,255,255,0.6);
    }

    .menu-button:hover {
      background-color:#9b59b6;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>🔮 Registration Portal of the Maneko Neki 🔮</h1>

  <div style="margin-bottom:20px;">
    <a href="index.html" class="menu-button">🐾 Back to Menu</a>
  </div>

  <form class="register-box" method="POST" action="https://formspree.io/f/xjgaeejp">
    <!-- aquí van tus inputs como antes -->
  </form>
</body>
</html>
