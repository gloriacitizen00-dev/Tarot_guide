<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Imagen responsiva */
    .responsive-img {
      max-width: 100%;   /* nunca excede el ancho del contenedor */
      height: auto;      /* mantiene proporción */
      display: block;    /* evita espacios extra */
      margin: 0 auto;    /* centra la imagen */
    }
  </style>
</head>
<body>
  <h1>Contacto</h1>
  
  <!-- Aquí insertas tu imagen exportada de Canva -->
  <img src="images/contact.png" alt="Imagen de contacto" class="responsive-img">
  
  <p>Bienvenido a la página de contacto.</p>
</body>
</html>
