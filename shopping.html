<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Center</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/shop.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;
    background-attachment: fixed;
    margin: 0;
    color: #fff;
    text-align: center;
    padding-top: 80px;
  }

  .btn {
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
    background-color: #6a5acd;
    margin: 10px;
    text-decoration: none;
    display: inline-block;
  }

  .btn:hover {
    background-color: #5941c2;
  }

  footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* Responsive adjustments */
  @media (max-width: 768px) {
    body {
      background-size: contain;
      padding-top: 60px;
    }
    .btn {
      font-size: 16px;
      padding: 12px 25px;
    }
  }

  @media (max-width: 480px) {
    body {
      background-size: contain;
      padding-top: 50px;
    }
    .btn {
      font-size: 14px;
      padding: 10px 20px;
      margin: 5px;
    }
  }
</style>
</head>

<body>

  <footer>
    <a href="subs.html" class="btn">Subscription</a>
    <a href="contact.html" class="btn">Contact</a>
    <a href="About.html" class="btn">About Us</a>
    <button class="btn" onclick="goNext()">Next</button>
    <button class="btn" onclick="goBack()">Back</button>
  </footer>

<script>
  function goNext() {
    window.location.href = "catalog.html"; 
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
