<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Center</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/shoppingcat.png');
    background-repeat: no-repeat;
    background-position: center top; /* keep top visible */
    background-size: cover;
    margin: 0;
    color: #fff;
    text-align: center;
    min-height: 100vh;
    position: relative; /* allow manual positioning */
  }

  .btn {
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
    background-color: #6a5acd;
    margin: 10px;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background-color: #5941c2;
  }

  .main-btn {
    font-size: 24px;
    padding: 22px 50px;
    position: absolute;
    top: 300px; /* move button down manually */
    left: 50%;
    transform: translateX(-50%);
    animation: glow 2s infinite alternate;
    box-shadow: 0 0 12px #6a5acd;
  }

  @keyframes glow {
    from { box-shadow: 0 0 12px #6a5acd; }
    to { box-shadow: 0 0 25px #b19cd9; }
  }

  footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  footer .btn {
    padding: 12px 28px;
    font-size: 16px;
    border-radius: 25px;
    background-color: #6a5acd;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  footer .btn:hover {
    background-color: #5941c2;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }
</style>
</head>

<body>

  <!-- Main central button -->
  <button class="btn main-btn" onclick="goNext()">Begin Your Magic Journey</button>

  <!-- Footer navigation buttons -->
  <footer>
    <a href="subs.html" class="btn">Subscription</a>
    <a href="contact.html" class="btn">Contact</a>
    <a href="About.html" class="btn">About Us</a>
    <button class="btn" onclick="goBack()">Back</button>
  </footer>

<script>
  function goNext() {
    window.location.href = "catalog.html"; 
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
