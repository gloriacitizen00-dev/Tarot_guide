<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Center</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/shoppingcat.png');
    background-repeat: no-repeat;
    background-position: center center;
    background-size: cover;   /* Always fill the screen */
    margin: 0;
    color: #fff;
    text-align: center;
    min-height: 100vh;        /* Ensure full viewport height */
    display: flex;
    flex-direction: column;
    justify-content: center;  /* Center content vertically */
    align-items: center;
  }

  .btn {
    padding: 15px 35px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    color: white;
    background-color: #6a5acd;
    margin: 10px;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
  }

  .btn:hover {
    background-color: #5941c2;
  }

  .main-btn {
    font-size: 24px;
    padding: 22px 50px;
    margin-bottom: 120px; /* space above footer buttons */
    animation: glow 2s infinite alternate; /* subtle glowing effect */
    box-shadow: 0 0 12px #6a5acd;
  }

  @keyframes glow {
    from { box-shadow: 0 0 12px #6a5acd; }
    to { box-shadow: 0 0 25px #b19cd9; }
  }

  footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;              /* space between buttons */
    flex-wrap: wrap;
  }

  footer .btn {
    padding: 12px 28px;
    font-size: 16px;
    border-radius: 25px;
    background-color: #6a5acd;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3); /* softer shadow */
  }

  footer .btn:hover {
    background-color: #5941c2;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4); /* glow on hover */
  }

  /* Tablet adjustments */
  @media (max-width: 768px) {
    body {
      background-attachment: scroll; /* disable fixed for tablets */
      background-position: top center;
    }
    .btn {
      font-size: 16px;
      padding: 12px 25px;
    }
    .main-btn {
      font-size: 20px;
      padding: 18px 40px;
    }
  }

  /* Phone adjustments */
  @media (max-width: 480px) {
    body {
      background-attachment: scroll; /* disable fixed for phones */
      background-position: top center;
    }
    .btn {
      font-size: 14px;
      padding: 10px 20px;
      margin: 5px;
    }
    .main-btn {
      font-size: 18px;
      padding: 15px 35px;
    }
  }
</style>
</head>

<body>

  <!-- Main central button -->
  <button class="btn main-btn" onclick="goNext()">Begin Your Magic Journey</button>

  <!-- Footer navigation buttons -->
  <footer>
    <a href="subs.html" class="btn">Subscription</a>
    <a href="contact.html" class="btn">Contact</a>
    <a href="About.html" class="btn">About Us</a>
    <button class="btn" onclick="goBack()">Back</button>
  </footer>

<script>
  function goNext() {
    window.location.href = "catalog.html"; 
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
