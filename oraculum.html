<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraculum</title>
  <style>
    html, body { 
      height: 100%;
      margin: 0;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Oraculum.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover; 
      color: #333; 
      text-align: center; 
      padding-top: 200px; /* adjust so the oraculum ball fits nicely */ 
    }

    #oraculum-container {
      margin-top: 50px;
    }

    #oraculum {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff9999, #990000);
      box-shadow: 0 0 20px #ff6666, 0 0 40px #990000;
      animation: glow 2s infinite alternate;

      position: relative;   /* permite mover con top/left */
      top: 100px;            /* baja la bola ~2 cm */
      left: 20px;           /* mueve a la derecha ~2 cm */
      margin: 0 auto;       /* mantiene centrado en general */
    }

    @keyframes glow {
      0% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
      50% { transform: scale(1.05); box-shadow: 0 0 30px #ff6666, 0 0 60px #990000; }
      100% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
    }

    #oraculum-message {
      margin-top: 180px;
      font-weight: bold;
      font-size: 1.2em;
      color: black;
      min-height: 2em;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      word-wrap: break-word;
      line-height: break-word;
    }

    .btn {
      margin-top: 90px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #444;
      color: white;
    }

    .btn:hover {
      background-color: #666;
    }

    /* Tablets */
    @media (max-width: 768px) {
      body {
        padding-top: 150px;
        background-size: cover;
        background-position: center top;
      }

      #oraculum {
        width: 100px;
        height: 100px;
        top: 100px;
        left: 10px;
      }

      #oraculum-message {
        font-size: 1em;
        margin-top: 130px;
      }
    }

    /* Móviles */
    @media (max-width: 480px) {
      body {
        padding-top: 120px;
        background-size: cover;
        background-position: center top;
      }

      #oraculum {
        width: 80px;
        height: 80px;
        top: 100px;
        left: 5px;
      }

      #oraculum-message {
        font-size: 0.9em;
        margin-top: 130px;
      }

      .btn {
        margin-top: 60px;
        padding: 10px 20px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>

  <div id="oraculum-container">
    <div id="oraculum"></div>
    <p id="oraculum-message">The Oraculum is thinking...</p>
  </div>

  <button id="new-reading" class="btn">New Reading</button>

  <script>
    const oraculumBallMessages = [
      "The path opens before you.",
      "Choices of the heart will guide your destiny.",
      "Trust your intuition.",
      "An unexpected opportunity approaches.",
      "Courage will light your way.",
      "Wisdom comes from listening, not speaking.",
      "A new friendship brings joy to your life.",
      "Change is near—embrace it with an open mind.",
      "Patience will reveal the answer you seek.",
      "Your efforts will soon bear fruit.",
      "A hidden truth will soon be revealed.",
      "Love may appear where you least expect it.",
      "Adventure awaits beyond the familiar.",
      "Reflect on the past to understand your future.",
      "A kind act returns to you multiplied.",
      "Trust that even setbacks have purpose.",
      "Creativity will unlock a new path.",
      "Listen to the whispers of your dreams.",
      "The winds of fortune favor the bold.",
      "Joy grows when shared with others."
    ];

    let hasRead = false;

    function getRandomMessage() {
      const index = Math.floor(Math.random() * oraculumBallMessages.length);
      return oraculumBallMessages[index];
    }

    function showOraculumMessage() {
      if (!hasRead) {
        hasRead = true;
        const messageEl = document.getElementById("oraculum-message");
        messageEl.textContent = "The Oraculum is thinking...";
        setTimeout(() => {
          messageEl.textContent = getRandomMessage();
        }, 2000);
      } else {
        window.location.href = "shopping.html";
      }
    }

    document.getElementById("new-reading").addEventListener("click", showOraculumMessage);

    showOraculumMessage();
  </script>

</body>
</html>
