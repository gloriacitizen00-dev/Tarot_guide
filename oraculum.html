<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraculum</title>
  <style>
    html, body { 
      height: 100%;
      margin: 0;
    }
    body { 
      font-family: 'Bodoni Moda', serif; 
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Oraculum.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover; 
      color: #000; 
      text-align: center; 
      padding-top: 120px; /* adjust so the oraculum ball fits nicely */ 
    }

    #oraculum-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #oraculum {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff9999, #990000);
      box-shadow: 0 0 30px #ff6666, 0 0 40px #990000;
      animation: glow 2s infinite alternate;
    }

    #oraculum-message {
     margin-top: 25px;   /* espacio justo debajo de la bola */
     font-weight: bold;
     font-size: 1.6em;
     color: #000;
     text-shadow: 1px 1px 3px #fff;
     max-width: 90%;
    }

  .buttons {
    display: flex;
    justify-content: center;
    gap: 20px; /* espacio entre botones */
    margin-top: 40px;
    flex-wrap: wrap; /* si no caben, se acomodan abajo */
  } 
    
    .btn {
      padding: 12px 25px;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff0000;
      color: white;
      transition: all 0.25s ease;
   }

    .btn:hover {
      background-color: #990000;
    }

 @keyframes glow {
      0% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
      50% { transform: scale(1.05); box-shadow: 0 0 30px #ff6666, 0 0 60px #990000; }
      100% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
    }

@media (max-width: 768px) {
  #oraculum { width: 140px; height: 140px; }
  #oraculum-message { font-size: 1.2em; }
}

@media (max-width: 480px) {
  #oraculum { width: 110px; height: 110px; }
  #oraculum-message { font-size: 1.1em; }
  .btn { width: 100%; } /* botones ocupan ancho completo en móvil */
}
      
  </style>
</head>
<body>
  <div class="console">
    <div id="oraculum-container">
      <div id="oraculum"></div>
      <p id="oraculum-message">The Oraculum is thinking...</p>
    </div>

  <div class="buttons">
    <button id="new-reading" class="btn">New Reading</button>
    <button id="go-store" class="btn">Go to the Store</button>
    <button id="go-back" class="btn">Go Back</button>
  </div>

 <script>
  const oraculumBallMessages = [
    "A surge of destiny electrifies your path.",
    "The cosmos roars — embrace the storm of change.",
    "Your spirit ignites with radiant power.",
    "Galaxies align to crown your courage.",
    "The veil shatters — truth bursts forth.",
    "A tide of fortune crashes at your feet.",
    "Stars blaze, calling you to rise higher.",
    "The universe whispers: your moment is now."
  ];

  let currentIndex = 0;

  function formatMessage(msg) {
      const words = msg.split(" ");
      const chunkSize = Math.ceil(words.length / 3);
      const line1 = words.slice(0, chunkSize).join(" ");
      const line2 = words.slice(chunkSize, chunkSize * 2).join(" ");
      const line3 = words.slice(chunkSize * 2).join(" ");
      return `${line1}<br>${line2}<br>${line3}`;
    }

  function showOraculumMessage() {
    const messageEl = document.getElementById("oraculum-message");

    // Stage 1: Awakening
    messageEl.innerHTML = "🔮 The Oraculum awakens...";

    // Stage 2: Build-up
    setTimeout(() => {
      messageEl.innerHTML = "⚡ Energy gathers... the currents shift...";
    }, 1500);

    // Stage 3: Revelation
    setTimeout(() => {
      const msg = oraculumBallMessages[currentIndex];
      messageEl.innerHTML = `🌌 Revelation:<br>${formatMessage(msg)}`;
      currentIndex = (currentIndex + 1) % oraculumBallMessages.length; // avanzar al siguiente
    }, 3000);

    // Stage 4: Closing
    setTimeout(() => {
      messageEl.innerHTML += "<br>🌙 The Oraculum rests...";
    }, 6000);
  }
   // Run only once when the page loads
  window.onload = showOraculumMessage;

    document.getElementById("new-reading").addEventListener("click", showOraculumMessage);
    document.getElementById("go-store").addEventListener("click", () => {
      window.location.href = "shopping.html";
    });
    document.getElementById("go-back").addEventListener("click", () => {
      window.location.href = "Spreads.html";
    });
  </script>
</body>
</html>
