<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraculum</title>
  <style>
    html, body { 
      height: 100%;
      margin: 0;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Oraculum.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover; 
      color: #333; 
      text-align: center; 
      padding-top: 200px; /* adjust so the oraculum ball fits nicely */ 
    }

    #oraculum-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 100px;
    }

    #oraculum {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff9999, #990000);
      box-shadow: 0 0 30px #ff6666, 0 0 40px #990000;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      0% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
      50% { transform: scale(1.05); box-shadow: 0 0 30px #ff6666, 0 0 60px #990000; }
      100% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
    }

    #oraculum-message {
     margin-top: 20px;   /* espacio justo debajo de la bola */
     font-weight: bold;
     font-size: 1.2em;
     color: #fff;
     text-shadow: 2px 2px 4px #000;
     text-align: center;
     width: 90%;
    }
    
    .btn {
      position: fixed; 
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff0000;
      color: white;
    }

    .btn:hover {
      background-color: #990000;
    }

    /* Tablets */
    @media (max-width: 768px) {
      #oraculum { width: 120px; height: 120px; }
      #oraculum-message { font-size: 1.1em; }
    }

      #oraculum {
        width: 100px;
        height: 100px;
        top: 100px;
        left: 10px;
      }

      #oraculum-message {
        font-size: 1em;
        margin-top: 110px;
      }
    }

    /* Móviles */
    @media (max-width: 480px) {
      #oraculum { width: 100px; height: 100px; }
      #oraculum-message { font-size: 1em; }
    }

      #oraculum {
        width: 80px;
        height: 80px;
        top: 100px;
        left: 5px;
      }

      #oraculum-message {
        font-size: 0.9em;
        margin-top: 110px;
      }

      .btn {
        margin-top: 60px;
        padding: 10px 20px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <!-- Oraculum content wrapped in a container -->
  <div class="console">
    <div id="oraculum-container">
      <div id="oraculum"></div>
      <p id="oraculum-message">The Oraculum is thinking...</p>
    </div>
    <button id="new-reading" class="btn">New Reading</button>
  </div>

  <!-- Your Oraculum ball logic script stays below -->
 <script>
  const oraculumBallMessages = [
    "A surge of destiny electrifies your path.",
    "The cosmos roars — embrace the storm of change.",
    "Your spirit ignites with radiant power.",
    "Galaxies align to crown your courage.",
    "The veil shatters — truth bursts forth.",
    "A tide of fortune crashes at your feet.",
    "Stars blaze, calling you to rise higher.",
    "The universe whispers: your moment is now."
  ];

  function getRandomMessage() {
    const index = Math.floor(Math.random() * oraculumBallMessages.length);
    return oraculumBallMessages[index];
  }

  function showOraculumMessage() {
    const messageEl = document.getElementById("oraculum-message");

    // Stage 1: Awakening
    messageEl.textContent = "🔮 The Oraculum awakens...";

    // Stage 2: Build-up
    setTimeout(() => {
      messageEl.textContent = "⚡ Energy gathers... the currents shift...";
    }, 1500);

    // Stage 3: Revelation
    setTimeout(() => {
     const msg = getRandomMessage();
     const messageEl = document.getElementById("oraculum-message");
     messageEl.innerHTML = `🌌 Revelation:<br>${msg}`;
     messageEl.style.fontSize = "1.2em";
     messageEl.style.color = "#fff";
     messageEl.style.textShadow = "2px 2px 4px #000";
    }, 3000);


    // Stage 4: Closing
    setTimeout(() => {
      messageEl.textContent += "\n🌙 The Oraculum rests...";
      messageEl.style.color = "#333";
    }, 6000);
  }

   // Run only once when the page loads
  window.onload = showOraculumMessage;

  // Redirect button to subscriptions page
  document.getElementById("Explore the Shop").addEventListener("click", () => {
    window.location.href = "shopping.html"; // replace with your actual subscription page URL
  });
   
</script>
</body>
</html>
