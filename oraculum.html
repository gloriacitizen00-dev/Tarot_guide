<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oraculum</title>
  <style>
    html, body { 
      height: 100%;
      margin: 0;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Oraculum.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover; 
      color: #333; 
      text-align: center; 
      padding-top: 200px; /* adjust so the oraculum ball fits nicely */ 
    }

    #oraculum-container {
      margin-top: 50px;
    }

    #oraculum {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #ff9999, #990000);
      box-shadow: 0 0 20px #ff6666, 0 0 40px #990000;
      animation: glow 2s infinite alternate;

      position: relative;   /* permite mover con top/left */
      top: 100px;            /* baja la bola ~2 cm */
      left: 20px;           /* mueve a la derecha ~2 cm */
      margin: 0 auto;       /* mantiene centrado en general */
    }

    @keyframes glow {
      0% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
      50% { transform: scale(1.05); box-shadow: 0 0 30px #ff6666, 0 0 60px #990000; }
      100% { transform: scale(1); box-shadow: 0 0 20px #ff6666, 0 0 40px #990000; }
    }

    #oraculum-message {
      margin-top: 160px;
      font-weight: bold;
      font-size: 0.9em;
      color: black;
      min-height: 2em;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      word-wrap: break-word;
      line-height: break-word;
    }

    .btn {
      position: fixed; 
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff0000;
      color: white;
    }

    .btn:hover {
      background-color: #990000;
    }

    /* Tablets */
    @media (max-width: 768px) {
      body {
        padding-top: 150px;
        background-size: cover;
        background-position: center top;
      }

      #oraculum {
        width: 100px;
        height: 100px;
        top: 100px;
        left: 10px;
      }

      #oraculum-message {
        font-size: 1em;
        margin-top: 110px;
      }
    }

    /* Móviles */
    @media (max-width: 480px) {
      body {
        padding-top: 120px;
        background-size: cover;
        background-position: center top;
      }

      #oraculum {
        width: 80px;
        height: 80px;
        top: 100px;
        left: 5px;
      }

      #oraculum-message {
        font-size: 0.9em;
        margin-top: 110px;
      }

      .btn {
        margin-top: 60px;
        padding: 10px 20px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <!-- Oraculum content wrapped in a container -->
  <div class="console">
    <div id="oraculum-container">
      <div id="oraculum"></div>
      <p id="oraculum-message">The Oraculum is thinking...</p>
    </div>
    <button id="new-reading" class="btn">New Reading</button>
  </div>

  <!-- Supabase access script -->
  <script type="module">

    import { createClient } from '@supabase/supabase-js'

    const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
    const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT5oy'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const subscriptionAccess = {
      "lunar diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","rituallunar.html","MysticalWeatherCalendar.html"],
      "solar diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","oraculum.html","rituallunar.html","solar.html","MysticalWeatherCalendar.html"],
      "cosmic diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","rituallunar.html","solar.html","MysticalWeatherCalendar.html","cosmic.html"]
    }

    async function checkAccess(currentPage) {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) {
        window.location.href = "login.html"
        return
      }

      const { data: user } = await supabase
        .from("users")
        .select("role, subscription, subscription_end")
        .eq("id", session.user.id)
        .single()

      let allowed = false
      const now = new Date()

      if (user.role === "admin") {
        allowed = true
      } else if (
        user.subscription &&
        subscriptionAccess[user.subscription]?.includes(currentPage) &&
        new Date(user.subscription_end) > now
      ) {
        allowed = true
      } else if (!user.subscription && currentPage === "oraculum.html") {
        allowed = true // free tier: curiosity.html only
      }

      if (!allowed) {
        document.querySelector(".console").innerHTML = `
          <h1>${currentPage} ✨</h1>
          <p class="message">Available only with the proper subscription.</p>
          <div class="data">
            This spread channels mystical insight. Unlocking it grants clarity,
            intuition, and guidance aligned with celestial cycles.
          </div>
          <p style="margin-top:20px;">
            🌌 Upgrade your subscription to access the full spread.
          </p>
        `;
      }
    }
    checkAccess("oraculum.html")
  </script>

  <!-- Your Oraculum ball logic script stays below -->
 <script>
  const oraculumBallMessages = [
    "A surge of destiny electrifies your path.",
    "The cosmos roars — embrace the storm of change.",
    "Your spirit ignites with radiant power.",
    "Galaxies align to crown your courage.",
    "The veil shatters — truth bursts forth.",
    "A tide of fortune crashes at your feet.",
    "Stars blaze, calling you to rise higher.",
    "The universe whispers: your moment is now."
  ];

  function getRandomMessage() {
    const index = Math.floor(Math.random() * oraculumBallMessages.length);
    return oraculumBallMessages[index];
  }

  function showOraculumMessage() {
    const messageEl = document.getElementById("oraculum-message");

    // Stage 1: Awakening
    messageEl.textContent = "🔮 The Oraculum awakens...";

    // Stage 2: Build-up
    setTimeout(() => {
      messageEl.textContent = "⚡ Energy gathers... the currents shift...";
    }, 1500);

    // Stage 3: Revelation
    setTimeout(() => {
      const msg = getRandomMessage();
      messageEl.textContent = `🌌 Revelation: ${msg}`;
      messageEl.style.fontSize = "1.4em";
      messageEl.style.color = "#990000";
    }, 3000);

    // Stage 4: Closing
    setTimeout(() => {
      messageEl.textContent += "\n🌙 The Oraculum rests...";
      messageEl.style.color = "#333";
    }, 6000);
  }

   // Run only once when the page loads
  window.onload = showOraculumMessage;

  // Redirect button to subscriptions page
  document.getElementById("new-reading").addEventListener("click", () => {
    window.location.href = "subs.html"; // replace with your actual subscription page URL
  });
   
</script>
</body>
</html>
