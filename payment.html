<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding: 40px;
    text-align: center;
  }

  h1 { color: #6a5acd; margin-bottom: 20px; }

  table {
    margin: 0 auto 30px auto;
    border-collapse: collapse;
    width: 80%;
    max-width: 600px;
  }

  th, td {
    padding: 10px 15px;
    border: 1px solid #ccc;
    text-align: center;
  }

  th { background-color: #6a5acd; color: white; }

  .btn {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    color: white;
  }

  .btn-sinpe { background-color: #4CAF50; }
  .btn-back { background-color: #555; }
</style>
</head>
<body>

<h1>Your Cart Summary</h1>

<table id="cart-table" border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Product</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Subtotal</th>
      <th>Remove</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<p id="total">Total: $0.00</p>

<div id="paypal-button-container"></div>

<button class="btn btn-sinpe" onclick="paySinpe()">Pagar con Sinpe</button>
<br>
<button class="btn btn-back" onclick="goBack()">Volver a productos</button>

<script src="https://www.paypal.com/sdk/js?client-id=AZX8Bi4WkdwtKivAaw4j85-NRiO7RBLMCClgd6YA1MEi2ztfuEIeIGUCnu2b0CtWU2qTVSFSogXqsx-k&currency=USD"></script>

<script>
const tbody = document.querySelector('#cart-table tbody');
let cart = JSON.parse(localStorage.getItem('cart')) || {};

// -----------------------------
// RENDER CART
// -----------------------------
function renderCart() {
  tbody.innerHTML = '';
  let total = 0;

  for (let key in cart) {
    const item = cart[key];
    const subtotal = item.price * item.quantity;
    total += subtotal;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${key}</td>
      <td>
        <input type="number" min="1" value="${item.quantity}" onchange="updateQuantity('${key}', this.value)">
      </td>
      <td>$${item.price.toFixed(2)}</td>
      <td>$${subtotal.toFixed(2)}</td>
      <td><button onclick="removeItem('${key}')">X</button></td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('total').textContent = `Total: $${total.toFixed(2)}`;
}

function updateQuantity(product, qty) {
  cart[product].quantity = parseInt(qty);
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

function removeItem(product) {
  delete cart[product];
  localStorage.setItem('cart', JSON.stringify(cart));
  renderCart();
}

// -----------------------------
// NAVIGATION
// -----------------------------
function goBack() {
  window.location.href = 'catalog.html';
}

function paySinpe() {
  alert('Redirecting to Sinpe payment with total $' + calculateTotal().toFixed(2));
}

// -----------------------------
// CALCULATE TOTAL
// -----------------------------
function calculateTotal() {
  let total = 0;
  for (let key in cart) {
    total += cart[key].price * cart[key].quantity;
  }
  return total;
}

// -----------------------------
// PAYPAL PAYMENT
// -----------------------------
paypal.Buttons({
  createOrder: function(data, actions) {
    return actions.order.create({
      purchase_units: [{
        amount: { value: calculateTotal().toFixed(2) },
        description: "Carrito de productos"
      }]
    });
  },
  onApprove: function(data, actions) {
    return actions.order.capture().then(function(details) {
      alert('Pago completado por ' + details.payer.name.given_name);
      localStorage.removeItem('cart');
      window.location.href = 'catalog.html';
    });
  }
}).render('#paypal-button-container');

// -----------------------------
// INITIAL RENDER
// -----------------------------
renderCart();
</script>

</body>
</html>
