<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding: 40px;
    text-align: center;
  }

  h1 { color: #6a5acd; margin-bottom: 20px; }

  table {
    margin: 0 auto 30px auto;
    border-collapse: collapse;
    width: 80%;
    max-width: 600px;
  }

  th, td {
    padding: 10px 15px;
    border: 1px solid #ccc;
    text-align: center;
  }

  th { background-color: #6a5acd; color: white; }

  .btn {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 10px;
    color: white;
  }

  .btn-sinpe { background-color: #4CAF50; }
  .btn-back { background-color: #555; }

</style>
</head>
<body>

<h1>Your cart Summary</h1>

<table id="cart-table" border="1" cellpadding="8">
  <thead>
    <tr>
      <th>Product</th>
      <th>Quantity</th>
      <th>Price</th>
      <th>Subtotal</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<p id="total">Total: $0.00</p>
<div id="paypal-button-container"></div>

<button class="btn btn-sinpe" onclick="paySinpe()">Pagar con Sinpe</button>
<br>
<button class="btn btn-back" onclick="goBack()">Volver a productos</button>

<script src="https://www.paypal.com/sdk/js?client-id=AZX8Bi4WkdwtKivAaw4j85-NRiO7RBLMCClgd6YA1MEi2ztfuEIeIGUCnu2b0CtWU2qTVSFSogXqsx-k&currency=USD"></script>

<script>
  const tbody = document.querySelector('#cart-table tbody');
  let total = 0;

  // --- Lógica para catálogo (carrito en localStorage) ---
  const cart = JSON.parse(localStorage.getItem('cart')) || {};
  for (let key in cart) {
    const item = cart[key];
    const qty = item.quantity;
    const price = item.price;
    const subtotal = qty * price;
    total += subtotal;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${key}</td>
      <td>${qty}</td>
      <td>$${price.toFixed(2)}</td>
      <td>$${subtotal.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  }

  // --- Lógica para suscripciones (parámetros en URL) ---
  const params = new URLSearchParams(window.location.search);
  const plan = params.get("plan");
  const planPrice = params.get("price");

  if (planPrice === "0.00") {
    // Ocultar PayPal y otros botones
    document.getElementById('paypal-button-container').style.display = "none";
    document.querySelector('.btn-sinpe').style.display = "none";
    document.querySelector('.btn-back').style.display = "none";

    // Mostrar mensaje elegante con calendario
    document.getElementById('total').innerHTML = `
      <div style="margin-top:30px; font-size:20px; background:#fff; color:#2e003e; padding:20px; border-radius:12px; display:inline-block;">
        <h2>Welcome to your Moon Subscription</h2>
        <p>This is valid for 7 days.</p>
        <p>Your subscription will end on: <strong>${new Date(Date.now() + 7*24*60*60*1000).toLocaleDateString()}</strong></p>
      </div>
    `;
    return; // salir aquí para que no se sobrescriba con el total normal
  }

  if (plan && planPrice) {
    const qty = 1;
    const subtotal = parseFloat(planPrice) * qty;
    total += subtotal;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${plan}</td>
      <td>${qty}</td>
      <td>$${parseFloat(planPrice).toFixed(2)}</td>
      <td>$${subtotal.toFixed(2)}</td>
    `;
    tbody.appendChild(tr);
  }

  // Mostrar total acumulado (carrito + suscripción si aplica)
  document.getElementById('total').textContent = `Total: $${total.toFixed(2)}`;

  function goBack() {
    window.location.href = 'catalog.html';
  }

  function paySinpe() {
    alert('Redirecting to Sinpe payment with total $' + total.toFixed(2));
  }

  // Render PayPal button con el total y descripción
  paypal.Buttons({
    createOrder: function(data, actions) {
      return actions.order.create({
        purchase_units: [{
          amount: { value: total.toFixed(2) },
          description: plan ? plan : "Carrito de productos"
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Pago completado por ' + details.payer.name.given_name);
        localStorage.removeItem('cart'); // limpiar carrito
        window.location.href = 'catalog.html';
      });
    }
  }).render('#paypal-button-container');
</script>

</body>
</html>
