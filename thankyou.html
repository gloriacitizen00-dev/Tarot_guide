<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Image */
    .thankyou-image {
      width: 90%;
      max-width: 500px;
      height: auto;
      margin-bottom: 20px;
    }

    /* Button */
    .btn-purple {
      background-color: #6a5acd;
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-purple:hover {
      background-color: #5a4acb;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <img src="thankyou.png" class="thankyou-image">

  <button class="btn-purple" onclick="goToCatalog()">
    Volver a la tienda
  </button>

  <script>
    function goToCatalog() {
      window.location.href = "catalog.html";
    }
  </script>

</body>
</html>
