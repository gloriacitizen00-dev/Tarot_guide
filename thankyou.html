<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Thank You</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000; /* fallback */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      position: relative;
    }

    /* Full screen image */
    img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 🔥 makes it responsive */
      z-index: 1;
    }

    /* Button */
    .btn-purple {
      position: relative;
      z-index: 2;
      background-color: #6a5acd;
      color: white;
      border: none;
      padding: 14px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-purple:hover {
      background-color: #5a4acb;
      transform: scale(1.05);
    }

    /* Button position (bottom center) */
    .button-container {
      position: absolute;
      bottom: 40px;
      z-index: 2;
    }

  </style>
</head>
