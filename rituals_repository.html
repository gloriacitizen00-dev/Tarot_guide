<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rituals</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Second.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .block-btn {
      background-color: rgba(200, 160, 255, 0.9); /* light purple */
      color: #fff;
      width: 80%;          /* ancho grande en desktop */
      max-width: 600px;    /* límite en pantallas grandes */
      padding: 40px;       /* espacio interno amplio */
      font-size: 2em;      /* texto grande */
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      margin: 20px 0;      /* separación entre bloques */
    }

    .block-btn:hover {
      background-color: rgba(200, 160, 255, 1);
    }

    /* Adaptación para tablets */
    @media (max-width: 1024px) {
      .block-btn {
        width: 85%;
        font-size: 1.8em;
        padding: 35px;
      }
    }

    /* Adaptación para teléfonos */
    @media (max-width: 768px) {
      .block-btn {
        width: 90%;
        font-size: 1.5em;
        padding: 30px;
      }
    }

    @media (max-width: 480px) {
      .block-btn {
        width: 95%;
        font-size: 1.2em;
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <button class="block-btn" onclick="goBeginners()">Beginners</button>
  <button class="block-btn" onclick="goIntermediate()">Intermediate</button>
  <button class="block-btn" onclick="goAdvanced()">Advanced</button>

  <script>
    function goBeginners() {
      window.location.href = "beginners.html";
    }

    function goIntermediate() {
      window.location.href = "intermediate.html";
    }

    function goAdvanced() {
      window.location.href = "advanced.html";
    }
  </script>
</body>
</html>
