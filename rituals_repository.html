<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rituals</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Bodoni Moda', serif;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Second.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .block-btn {
      background-color: rgba(200, 160, 255, 0.9);
      color: #fff;
      width: 80%;
      max-width: 600px;
      padding: 30px 20px;
      font-size: 1.8em;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: 0.3s;
      margin: 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .block-btn img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 2px solid #fff;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 1.4em;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 0.8em;
      color: #f0eaff;
      max-width: 500px;
    }

    .block-btn:hover {
      background-color: rgba(200, 160, 255, 1);
    }

    @media (max-width: 768px) {
      .block-btn {
        width: 90%;
        font-size: 1.4em;
        padding: 20px;
      }
      .block-btn img {
        width: 70px;
        height: 70px;
      }
    }

    @media (max-width: 480px) {
      .block-btn {
        width: 95%;
        font-size: 1.2em;
        padding: 15px;
      }
      .block-btn img {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <button class="block-btn" onclick="goLunar()">
    <img src="themoon.png" alt="Lunar Diamond">
    <div class="title">Lunar Diamond</div>
    <div class="desc">Harness lunar intuition with gentle nightly rituals guided by your familiar.</div>
  </button>

  <button class="block-btn" onclick="goSolar()">
    <img src="thesun.png" alt="Solar Diamond">
    <div class="title">Solar Diamond</div>
    <div class="desc">Channel solar vitality with morning practices that awaken clarity and strength.</div>
  </button>

  <button class="block-btn" onclick="goCosmic()">
    <img src="thecosmic.png" alt="Cosmic Diamond">
    <div class="title">Cosmic Diamond</div>
    <div class="desc">Embrace cosmic unity with expansive rituals that connect you to the infinite.</div>
  </button>

  <script>
    function goLunar() {
      window.location.href = "rituallunar.html";
    }
    function goSolar() {
      window.location.href = "ritualsolar.html";
    }
    function goCosmic() {
      window.location.href = "cosmic.html";
    }
  </script>
</body>
</html>
