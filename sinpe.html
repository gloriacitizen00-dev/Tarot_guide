<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SINPE</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    img {
      max-width: 90%;
      max-height: 70vh;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .btn-purple {
      margin-top: 20px;
      background-color: #6a5acd;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-purple:hover {
      background-color: #5a4acb;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- SINPE Image -->
  <img src="Sinpemovilcr.png" alt="SINPE Instructions">

  <!-- Button -->
  <button class="btn-purple" onclick="goToThankYou()">
    Ya realicé el pago
  </button>

  <script>
    function goToThankYou() {
      window.location.href = "thankyou.html";
    }
  </script>

</body>
</html>
