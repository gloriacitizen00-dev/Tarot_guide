<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Your Deck</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..700&family=Bodoni+Moda:wght@400..700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Bodoni Moda', serif;
  background-image: url('https://raw.githubusercontent.com/gloriacitizen00-dev/Tarot_guide/main/Third.png');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover; 
  background-attachment: fixed;
  background-color: #ffffff;
  margin: 0;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  text-align: center;
  color: #000000;
}

/* TITLE */
h1 {
  font-family: 'Cinzel', serif;
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 20px;
}

/* TEXT */
.instructions {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 25px;
  max-width: 600px;
}

/* CONTAINER */
.center-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 60px;
}

/* BUTTON ROW */
.deck-options { 
  display: flex; 
  gap: 20px; 
  margin-top: 20px;
  justify-content: center; 
  flex-wrap: wrap;
}

/* BUTTONS */
button { 
  padding: 14px 28px; 
  font-size: 18px; 
  font-weight: 700; 
  cursor: pointer; 
  background-color: #cc0000;
  color: #ffffff;
  border: none;
  border-radius: 25px;
  transition: all 0.3s ease;
}

button:hover {
  background-color: #ff4d4d;
  transform: scale(1.05);
}

/* TABLET */
@media (max-width: 768px) {
  body {
    background-size: 95% auto;
  }

  h1 {
    font-size: 36px;
  }
}

/* MOBILE */
@media (max-width: 480px) {
  body {
    background-size: 100% auto;
  }

  button {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="center-container">
  <h1>Choose Your Deck</h1>
  <p class="instructions">
    Choose one of the decks below — 
    <strong>Major Arcana</strong>, 
    <strong>Minor Arcana</strong>, 
    or <strong>Mixed</strong>.
  </p>
  
  <div class="deck-options">
    <button onclick="chooseDeck('major')">Major Arcana</button>
    <button onclick="chooseDeck('minor')">Minor Arcana</button>
    <button onclick="chooseDeck('mixed')">Mixed Deck</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const spread = params.get('spread');

if (!spread) {
  alert("No spread selected. Returning to homepage.");
  window.location.href = "index.html";
}

function chooseDeck(type) {
  window.location.href = `${spread}.html?deck=${type}&spread=${spread}`;
}
</script>

</body>
</html>
