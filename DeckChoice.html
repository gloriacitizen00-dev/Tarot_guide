<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Choose Your Deck</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-image: url('https://raw.githubusercontent.com/gloriacitizen00-dev/Tarot_guide/main/Third.png');
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  background-attachment: fixed;
  background-color: #af69cd;
  margin: 0;

  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  text-align: center;
}

@media (max-width: 768px) {
  body {
    background-size: 95% auto;
  }
}

@media (max-width: 480px) {
  body {
    background-size: 100% auto;
  }
}

.center-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
}

h1 { 
  margin-bottom: 10px; 
}

.instructions {
  font-size: 18px;
  margin-bottom: 20px;
  color: #fff; /* white text for contrast */
}

.deck-options { 
  display: flex; 
  gap: 20px; 
  margin-top: 20px; 
  justify-content: center; 
}

button { 
  padding: 10px 20px; 
  font-size: 16px; 
  cursor: pointer; 
  background-color: #ffcc00;
  color: #000;
  border: none;
  border-radius: 25px;
}
</style>
</head>

<body>

<div class="center-container">
  <h1>Choose Your Deck</h1>
  <p class="instructions">Choose one of the decks below — Major Arcana, Minor Arcana, or Mixed — to continue.</p>

  <div class="deck-options">
    <button onclick="chooseDeck('major')">Major Arcana</button>
    <button onclick="chooseDeck('minor')">Minor Arcana</button>
    <button onclick="chooseDeck('mixed')">Mixed Deck</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const spread = params.get('spread');

if (!spread) {
  alert("No spread selected. Returning to homepage.");
  window.location.href = "index.html";
}

function chooseDeck(type) {
  window.location.href = `${spread}.html?deck=${type}&spread=${spread}`;
}
</script>

</body>
</html>
