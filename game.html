<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Experience</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Second.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center; /* centra verticalmente */
      align-items: center;     /* centra horizontalmente */
      text-align: center;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: radial-gradient(circle at 50% 70%, rgba(200,200,200,0.25) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0.5;
      animation: smokeMove 25s infinite linear;
    }

    body::after {
      background: radial-gradient(circle at 30% 80%, rgba(180,180,180,0.2) 0%, transparent 80%);
      filter: blur(80px);
      opacity: 0.4;
      animation: smokeDrift2 35s infinite linear;
    }

    @keyframes smokeMove {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-50px) scale(1.2); }
      100% { transform: translateY(-100px) scale(1); }
    }

    @keyframes smokeDrift2 {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-40px) scale(1.1); }
      100% { transform: translateY(-80px) scale(1); }
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    .title-btn {
      background-color: rgba(255,255,255,0.9);
      color: #000;
      padding: 20px 40px;
      font-size: 1.5em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 40px;
    }

    .title-btn:hover {
      background-color: rgba(255,255,255,1);
    }

    .btn {
      background-color: rgba(200, 160, 255, 0.9);
      color: #fff;
      padding: 20px 40px;
      font-size: 1.5em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: rgba(200, 160, 255, 1);
    }

    @media (max-width: 768px) {
      .title-btn {
        font-size: 1.2em;
        padding: 15px 30px;
      }

      .btn {
        font-size: 1.2em;
        padding: 15px 30px;
        margin-top: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- Primer botón -->
  <button class="title-btn" onclick="goToRepository()">✨ Welcome to the Mantras & Rituals ✨</button>

  <!-- Segundo botón -->
  <button class="btn" onclick="goToSpreads()">Continue</button>

  <!-- Tercer botón -->
  <button class="btn subscribe-btn" onclick="goToSubscription()">Subscribe</button>

  <script>
    function goToRepository() {
      window.location.href = "rituals_repository.html"; 
    }

    function goToSpreads() {
      window.location.href = "Spreads.html";
    }

    function goToSubscription() {
      window.location.href = "Subscriptions.html";
    }

    function goToRituals() {
      let subscribed = false;
      if (!subscribed) {
        alert("Please purchase a plan to access rituals.");
      } else {
        window.location.href = "rituals_repository.html";
      }
    }
  </script>
</body>
</html>
