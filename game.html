<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Experience</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Second.png'); /* pon aquí tu .png */
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover; /* se adapta a la pantalla */
      color: #000; /* texto negro */
      display: flex;
      flex-direction: column;
      justify-content: center; /* baja el contenido a la mitad */
      align-items: center;
      text-align: center;
      position: relative
    }

     body::before,
     body::after {
       content: "";
       position: fixed;
       top: 0; left: 0;
       width: 100%; height: 100%;
       pointer-events: none;
       z-index: 0;
    }

    /* First smoke layer */
    body::before {
       background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%);
       filter: blur(40px);
       opacity: 0.4;
       animation: smokeMove 25s infinite linear;
     }

   /* Second smoke layer */
    body::after {
      background: radial-gradient(circle at 30% 70%, rgba(255,255,255,0.2) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0.25;
      animation: smokeDrift2 35s infinite linear;
    }
    
@keyframes smokeMove {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-50px) scale(1.2); }
  100% { transform: translateY(-100px) scale(1); }
    }

@keyframes smokeDrift2 {
  0% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-40px) scale(1.1); }
  100% { transform: translateY(-80px) scale(1); }
   } 
    
body > * {
  position: relative;
  z-index: 1;
    }

    /* Title as button */
    .title-btn {
      background-color: rgba(255,255,255,0.9);
      color: #000;
      padding: 20px 40px;
      font-size: 1.5em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 40px;
      }
    
    .title-btn:hover {
      background-color: rgba(255,255,255,1);
      }

    .btn {
      background-color: #444;
      color: white;
      padding: 15px 30px;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 40px;
    }

    .btn:hover {
      background-color: #666;
    }
    
    @media (max-width: 768px) {
      .title-btn {
        font-size: 1.2em;
        padding: 15px 30px;
    }
    .btn {
      font-size: 1em;
      padding: 10px 20px
    }
 }
    
</style>
  </head>
  <body>
    
   <!-- Title as button --> 
    <button class="title-btn" onclick="goToRepository()">✨ Welcome to the Mantras & Rituals ✨</button>
    <button class="btn" onclick="goToSpreads()">Continue</button>
    <button class="btn" onclick="goToSubscription()">Subscribe</button>
<script>
  
  function goToSpreads() {
    window.location.href = "Spreads.html";
  }

  function goToRituals() {
    let subscribed = false; // replace with real subscription check
    if (!subscribed) {
     alert("Please purchase a plan to access rituals.");
      } else {
        window.location.href = "rituals.html";
  }
 }   
  </script>
</body>
</html>
