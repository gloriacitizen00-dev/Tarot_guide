<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Experience</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Second.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: center; /* centra verticalmente */
      align-items: center;     /* centra horizontalmente */
      text-align: center;
      position: relative;
    }

    header {
      position: absolute;
      top: 0;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 0;
      z-index: 2;
    }

    header a {
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 1.2rem;
      margin: 5px;
      padding: 10px 18px;
      border-radius: 10px;
      background-color: rgba(200, 160, 255, 0.9); /* SAME AS BUTTONS */
      transition: all 0.3s ease;
    }

    header a:hover {
      background-color: rgba(220, 180, 255, 1);
      transform: scale(1.05);
    }

    header a::after {
      content: " ✨";
      opacity: 0;
      transition: opacity 0.3s;
    }

    header a:hover::after {
      opacity: 1;
    }

    /* SMOKE EFFECT */
    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: radial-gradient(circle at 50% 70%, rgba(200,200,200,0.25) 0%, transparent 70%);
      filter: blur(60px);
      opacity: 0.5;
      animation: smokeMove 25s infinite linear;
    }

    body::after {
      background: radial-gradient(circle at 30% 80%, rgba(180,180,180,0.2) 0%, transparent 80%);
      filter: blur(80px);
      opacity: 0.4;
      animation: smokeDrift2 35s infinite linear;
    }

    @keyframes smokeMove {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-50px) scale(1.2); }
      100% { transform: translateY(-100px) scale(1); }
    }

    @keyframes smokeDrift2 {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-40px) scale(1.1); }
      100% { transform: translateY(-80px) scale(1); }
    }

    body > * {
      position: relative;
      z-index: 1;
    }
.welcome-btn {
  background-color: rgba(200, 160, 255, 0.9);
  color: #fff;
  padding: 20px 40px;
  font-size: 1.5em;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  margin-bottom: 20px;
}

.welcome-btn:hover {
  background-color: rgba(220, 180, 255, 1);
}

    .btn {
      background-color: rgba(200, 160, 255, 0.9);
      color: #fff;
      padding: 20px 40px;
      font-size: 1.5em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 20px;
    }

    .btn:hover {
      background-color: rgba(200, 160, 255, 1);
    }

    @media (max-width: 768px) {
      .title-btn {
        font-size: 1.2em;
        padding: 15px 30px;
      }
    }
  </style>
</head>
<body>

  <header>
