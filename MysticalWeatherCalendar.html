<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mystical Weather Calendar - Alaska</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #05070f, #000);
  color:white;
  padding:20px;
}

h1 {
  text-align:center;
  color:#9ecbff;
}

.info {
  text-align:center;
  font-size:13px;
  color:#cfd8e3;
  max-width:800px;
  margin:0 auto 20px auto;
}

.calendar {
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:10px;
  max-width:1000px;
  margin:0 auto;
}

.day {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:10px;
  min-height:110px;
  text-align:center;
}

.date {
  font-size:12px;
  color:#aaa;
  margin-bottom:6px;
}

.temp {
  font-size:14px;
  color:#9ecbff;
  margin-top:5px;
}

.icon {
  font-size:22px;
}
.loading {
  text-align:center;
  margin-top:20px;
  color:#9ecbff;
}
</style>
</head>

<body>

<h1>🌌 Mystical Weather Calendar - Alaska</h1>

<div class="info">
This calendar blends real NOAA-based weather forecasts with a symbolic daily structure.
Each day reflects actual atmospheric conditions in Alaska, updated automatically.
</div>

<div id="loading" class="loading">Loading cosmic weather...</div>

<div class="calendar" id="calendar"></div>

<script>
// 🌍 Alaska coordinates (Anchorage)
const LAT = 61.2181;
const LON = -149.9003;

// 🌤️ Weather icons
function getIcon(code) {
  if (code === 0) return "☀️";
  if (code <= 3) return "🌤️";
  if (code <= 48) return "☁️";
  if (code <= 67) return "🌧️";
  if (code <= 77) return "❄️";
  if (code <= 82) return "🌦️";
  return "🌩️";
}

// 📅 Get month days
function getDaysInMonth() {
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
}

// 🌡️ Fetch REAL weather
async function fetchWeather() {
  const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
    `&daily=temperature_2m_max,weathercode&timezone=auto`;

  const res = await fetch(url);
  return await res.json();
}

// 🌌 Render calendar
async function render() {
  const data = await fetchWeather();
  const days = getDaysInMonth();

  const temps = data.daily.temperature_2m_max;
  const codes = data.daily.weathercode;

  const calendar = document.getElementById("calendar");
  document.getElementById("loading").style.display = "none";

  for (let i = 0; i < days; i++) {
    const div = document.createElement("div");
    div.className = "day";

    const temp = temps[i] ?? "—";
    const code = codes[i] ?? 0;

    div.innerHTML = `
      <div class="date">Day ${i+1}</div>
      <div class="icon">${getIcon(code)}</div>
      <div class="temp">${temp}°C</div>
    `;

    calendar.appendChild(div);
  }
}

render();
</script>

</body>
</html>
