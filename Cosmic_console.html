<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Oracle</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0c10; color: #c5c6c7; text-align: center; }
    .oracle { 
      margin: 2em auto; 
      padding: 2em; 
      background: #1f2833; 
      border-radius: 12px; 
      width: 400px; 
      box-shadow: 0 0 20px #45a29e;
      text-align: center;
    }
    .message { font-size: 1.2em; color: #66fcf1; }
    .data { margin-top: 1em; font-size: 0.9em; color: #45a29e; }
  </style>
</head>
<body>
  <h1>Digital Oracle</h1>
  <div class="oracle">
    <p class="message" id="oracleMessage">Consulting cosmic signals...</p>
    <div class="data" id="oracleData">Loading data...</div>
  </div>
<script>
  async function fetchIonosphereData() {
    try {
      // Example: NOAA SWPC JSON feed (replace with actual TEC endpoint)
      const response = await fetch("https://services.swpc.noaa.gov/json/tec/latest.json");
      const data = await response.json();

      // Assume the feed returns an array of TEC values
      const latestTEC = data[0].tec; // adjust key depending on feed structure

      document.getElementById("ionosphereScore").textContent = latestTEC + " TEC";
    } catch (error) {
      console.error("Error fetching ionosphere data:", error);
      document.getElementById("ionosphereScore").textContent = "Data unavailable";
    }
  }

  // Call once on page load
  fetchIonosphereData();

  // Refresh every 5 minutes
  setInterval(fetchIonosphereData, 300000);
  async function loadSpaceWeather() {
    try {
      // Kp Index en vivo desde NOAA SWPC
      const kpResponse = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
      const kpData = await kpResponse.json();
      const kpIndex = kpData[kpData.length - 1]?.kp_index ?? 0;

      // Plasma Density en vivo desde NOAA DSCOVR
      const plasmaResponse = await fetch("https://services.swpc.noaa.gov/json/dscovr/space_weather.json");
      const plasmaData = await plasmaResponse.json();
      const lastEntry = plasmaData[plasmaData.length - 1];
      const plasmaDensity = lastEntry?.proton_density ?? 0;

      // Mensajes
      const positiveMessages = [
        "✨ Stability surrounds you. The cosmos offers clarity.",
        "🌌 Calm skies guide your path today.",
        "🔮 Predictability reigns — trust steady progress."
      ];
      const negativeMessages = [
        "⚡ Turbulence rises. Chaos reshapes your path.",
        "🌑 Storms test your resilience — transformation awaits.",
        "🔥 The cosmos is restless. Prepare for change."
      ];

      // Selección de mensaje
      let messagePool = (kpIndex <= 3 && plasmaDensity < 6) ? positiveMessages : negativeMessages;
      const message = messagePool[Math.floor(Math.random() * messagePool.length)];
      document.getElementById("oracleMessage").textContent = message;

      // Índices derivados
      const reliabilityIndex = Math.max(0, 100 - kpIndex * 10);
      const chaosIndex = kpIndex * 15 + plasmaDensity;

      // Mostrar datos
      document.getElementById("oracleData").textContent =
        "Plasma Density: " + plasmaDensity + " p/cm³ | " +
        "Kp Index: " + kpIndex + " | " +
        "Reliability Index: " + reliabilityIndex + "% | " +
        "Chaos Index: " + chaosIndex.toFixed(1);
    } catch (error) {
      document.getElementById("oracleMessage").textContent = "Error consulting cosmic data.";
      console.error("Fetch error:", error);
    }
  }

  loadSpaceWeather();
</script>



</body>
</html>
