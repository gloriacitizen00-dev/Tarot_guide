<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmic Crystal Ball</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0c10; color: #c5c6c7; text-align: center; }
    .ball { margin: 2em auto; padding: 2em; background: #1f2833; border-radius: 50%; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; }
    .message { font-size: 1.2em; color: #66fcf1; }
    .data { margin-top: 1em; font-size: 0.9em; color: #45a29e; }
  </style>
</head>
<body>
  <h1>Cosmic Console</h1>
  <div class="ball">
    <p class="message" id="cosmicMessage">Consulting the cosmos...</p>
  </div>
  <div class="data" id="cosmicData">Loading data...</div>

  <script>
    // Placeholder values (later replace with live NOAA/ESA API data)
    const plasmaDensity = 5.2;   // Example TEC value
    const kpIndex = 2;           // Example geomagnetic storm level

    let message;
    if (kpIndex <= 3 && plasmaDensity < 6) {
      message = "✨ The cosmos smiles upon you. Stability guides your path.";
    } else {
      message = "⚡ Storms rise in the sky. Chaos brings transformation.";
    }

    // Show message
    document.getElementById("cosmicMessage").textContent = message;

    // Show research data
    const reliabilityIndex = Math.max(0, 100 - kpIndex * 10);
    const chaosIndex = kpIndex * 15 + plasmaDensity;
    document.getElementById("cosmicData").textContent =
      "Plasma Density: " + plasmaDensity + " TEC | " +
      "Kp Index: " + kpIndex + " | " +
      "Reliability Index: " + reliabilityIndex + "% | " +
      "Chaos Index: " + chaosIndex.toFixed(1);
  </script>
</body>
</html>
