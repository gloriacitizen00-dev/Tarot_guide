<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cosmic Console</title>
<style>
body {
  margin:0;
  font-family:Arial;
  color:#c5c6c7;
  text-align:center;
  overflow:auto;
  background:black;
}

#stars {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.console {
  margin-top:40px;
  padding:25px;
  width:460px;
  background:rgba(20,30,40,0.85);
  border-radius:14px;
  box-shadow:0 0 25px #45a29e;
  margin-left:auto;
  margin-right:auto;
}

h1 { color:#66fcf1; }

.message {
  font-size:1.3em;
  margin-bottom:15px;
  color:#66fcf1;
}

.data {
  margin-top:10px;
  color:#45a29e;
}

.bar {
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:#66fcf1;
  width:0%;
  transition:width 1s;
}

.footer {
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.footer a {
  text-decoration:none;
}

.footer button {
  padding:10px 16px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
}

.footer button:hover {
  background:rgba(102,252,241,0.3);
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="console">
  <h1>Cosmic Console</h1>
  <p class="message" id="oracleMessage">Scanning cosmic environment...</p>
  <div class="data" id="oracleData">Loading space weather...</div>

  <div class="data">Solar Wind Speed</div>
  <div class="bar"><div id="speedBar" class="fill"></div></div>
</div>

<div class="data">
  Live Earth View
</div>

<img src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/FD/GEOCOLOR/latest.jpg"
     width="420"
     style="margin-top:10px;border-radius:10px;">

<script>
// STARFIELD
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
    star.y += 0.1;
    if (star.y > canvas.height) star.y = 0;
  });

  requestAnimationFrame(drawStars);
}
drawStars();

// SPACE WEATHER (SIMPLIFIED)
async function loadSpaceWeather() {
  try {
    const response = await fetch("https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json");

    if (!response.ok) throw new Error("Fetch failed");

    const data = await response.json();

    let speed = 0;
    let density = 0;

    for (let i = data.length - 1; i > 0; i--) {
      const d = parseFloat(data[i][1]);
      const s = parseFloat(data[i][2]);

      if (!isNaN(d) && !isNaN(s)) {
        density = d;
        speed = s;
        break;
      }
    }

    document.getElementById("oracleMessage").textContent = "✨ Space weather online";

    document.getElementById("oracleData").innerHTML =
      `Solar Wind Speed: ${speed} km/s<br>
       Plasma Density: ${density} p/cm³`;

    document.getElementById("speedBar").style.width =
      Math.min(100, speed / 10) + "%";

  } catch (error) {
    document.getElementById("oracleMessage").textContent = "❌ Unable to load data";
    document.getElementById("oracleData").textContent = error.message;
  }
}

// Run
loadSpaceWeather();
setInterval(loadSpaceWeather, 300000);
</script>

<div class="footer">
  <a href="index.html"><button>🏠 Home</button></a>
  <a href="shopping.html"><button>🛍 Shopping</button></a>
  <a href="AuroraCalendar.html"><button>🌌 Cosmic Calendar</button></a>
</div>

</body>
</html>
