<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Oracle</title>

<style>
body{
font-family:Arial;
background:#0b0c10;
color:#c5c6c7;
text-align:center;
}

.oracle{
margin:2em auto;
padding:2em;
background:#1f2833;
border-radius:12px;
width:420px;
box-shadow:0 0 20px #45a29e;
}

.message{
font-size:1.3em;
color:#66fcf1;
margin-bottom:20px;
}

.data{
font-size:0.95em;
color:#45a29e;
margin-top:10px;
}
</style>
</head>

<body>

<h1>Digital Oracle</h1>

<div class="oracle">

<p class="message" id="oracleMessage">
Consulting cosmic signals...
</p>

<div class="data" id="oracleData">
Loading space weather...
</div>

</div>

<script>

async function loadSpaceWeather(){

try{

/* ---------- Kp Index ---------- */

const kpResponse = await fetch(
"https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json"
);

const kpData = await kpResponse.json();

/* NOAA format: first row = headers */
const kpLast = kpData[kpData.length-1];
const kpIndex = parseFloat(kpLast[1]) || 0;


/* ---------- Solar Wind Density ---------- */

const plasmaResponse = await fetch(
"https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json"
);

const plasmaData = await plasmaResponse.json();

/* first row = headers */
const plasmaLast = plasmaData[plasmaData.length-1];
const plasmaDensity = parseFloat(plasmaLast[2]) || 0;


/* ---------- Oracle Messages ---------- */

const positiveMessages = [
"✨ Stability surrounds you. The cosmos offers clarity.",
"🌌 Calm cosmic winds guide your path.",
"🔮 Harmony flows through space today."
];

const negativeMessages = [
"⚡ Solar turbulence rises — expect disruption.",
"🌑 The magnetosphere trembles.",
"🔥 Cosmic storms stir hidden forces."
];

let messagePool;

if(kpIndex <= 3 && plasmaDensity < 6){
messagePool = positiveMessages;
}else{
messagePool = negativeMessages;
}

const message =
messagePool[Math.floor(Math.random()*messagePool.length)];

document.getElementById("oracleMessage").textContent = message;


/* ---------- Derived Metrics ---------- */

const reliabilityIndex = Math.max(0,100 - kpIndex*10);
const chaosIndex = kpIndex*15 + plasmaDensity;


/* ---------- Display ---------- */

document.getElementById("oracleData").innerHTML =
"Solar Wind Density: "+plasmaDensity+" p/cm³<br>"+
"Geomagnetic Activity: Kp="+kpIndex+"<br>"+
"Reliability Index: "+reliabilityIndex+"%<br>"+
"Chaos Index: "+chaosIndex.toFixed(1);

}

catch(error){

console.error(error);

document.getElementById("oracleMessage").textContent =
"Unable to reach cosmic sensors.";

document.getElementById("oracleData").textContent =
"Space weather network offline.";

}

}

/* run */

loadSpaceWeather();

/* refresh every 5 minutes */

setInterval(loadSpaceWeather,300000);

</script>

</body>
</html>
