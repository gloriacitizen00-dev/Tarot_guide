<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      position: relative;
      background-image: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Eight.png');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      background-attachment: fixed;
      color: #333;
      overflow: hidden;
    }

    #card-container {
      position: absolute;
      top: 180px;
      left: 0;
      right: 0;
      margin: 0 auto;
      max-width: 1000px;
      display: flex;
      justify-content: space-between; /* texto izquierda, carta derecha */
      align-items: flex-start;
      gap: 40px;
      padding: 0 20px; /* aire a los lados */
    }

    #card-left {
      flex: 1;
      text-align: left;
    }

    #card-right {
      flex-shrink: 0;
    }

    #card-image {
      width: 310px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    #card-name {
      margin-top: 20px;
      font-size: 2em;
      color: #990000;
    }

    #card-meaning, #card-advice {
      font-size: 1.2em;
      margin-top: 15px;
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #444;
      color: white;
    }

    .btn:hover {
      background-color: #666;
    }

    /* 📱 Celulares */
    @media (max-width: 600px) {
      #card-container {
        flex-direction: row;   /* mantiene texto izquierda, carta derecha */
        gap: 20px;
        max-width: 100%;
        padding: 0 10px;
      }

      #card-image {
        width: 200px;          /* carta más pequeña */
        height: auto;
      }

      #card-left {
        font-size: 0.9em;      /* texto más compacto */
      }
    }

    /* 📲 Tablets */
    @media (min-width: 601px) and (max-width: 900px) {
      #card-container {
        flex-direction: row;   /* igual: texto izquierda, carta derecha */
        gap: 30px;
        max-width: 95%;
        padding: 0 20px;
      }

      #card-image {
        width: 250px;          /* carta un poco más grande que en móvil */
        height: auto;
      }
    }
  </style>
</head>
<body>

  <div id="card-container">
    <div id="card-left">
      <h2 id="card-name"></h2>
      <p id="card-meaning"></p>
      <p id="card-advice"></p>
      <button id="new-card" class="btn">Draw a New Card</button>
    </div>
    <div id="card-right">
      <img id="card-image" src="" alt="Card of the Day">
    </div>
  </div>

  <script>
    const cards = [
      {
        name: "The Fool",
        image: "images/MajorArcana/TheFool.png",
        meaning: "New beginnings, adventure, spontaneity, optimism.",
        advice: "Take a leap of faith, but stay mindful of risks."
      },
      {
        name: "The Magician",
        image: "images/MajorArcana/TheMagician.png",
        meaning: "Skill, resourcefulness, manifestation, creativity.",
        advice: "Use your talents wisely to achieve your goals."
      }
      // Add all other cards here...
    ];

    function getCardOfTheDay() {
      const today = new Date();
      const index = today.getDate() % cards.length;
      return cards[index];
    }

    function showCard(card) {
      document.getElementById("card-image").src = card.image;
      document.getElementById("card-name").textContent = card.name;
      document.getElementById("card-meaning").textContent = `Meaning: ${card.meaning}`;
      document.getElementById("card-advice").textContent = `Advice: ${card.advice}`;
    }

    showCard(getCardOfTheDay());

    document.getElementById("new-card").addEventListener("click", () => {
      const randomIndex = Math.floor(Math.random() * cards.length);
      showCard(cards[randomIndex]);
    });
  </script>

</body>
</html>
