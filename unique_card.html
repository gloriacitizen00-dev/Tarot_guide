<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #fff; /* fondo blanco */
      color: #333;
      text-align: center;     /* todo centrado */
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5em;
      color: #990000;
    }

    #card-image {
      width: 300px;           /* tamaño fijo */
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;
    }

    #card-name {
      font-size: 2em;
      margin-top: 10px;
      color: #444;
    }

    #card-meaning, #card-advice {
      font-size: 1.2em;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #444;
      color: white;
    }

    .btn:hover {
      background-color: #666;
    }

    /* 📱 Responsivo */
    @media (max-width: 600px) {
      #card-image {
        width: 220px; /* más pequeño en móvil */
      }
      h1 {
        font-size: 2em;
      }
      #card-name {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>

  <h1>CARD OF THE DAY</h1>

  <img id="card-image" src="images/MajorArcana/TheMagician.png" alt="Card of the Day">

  <h2 id="card-name">The Magician</h2>
  <p id="card-meaning">Meaning: Skill, resourcefulness, manifestation, creativity.</p>
  <p id="card-advice">Advice: Use your talents wisely to achieve your goals.</p>

  <button id="new-card" class="btn">Draw a New Card</button>

</body>
</html>
