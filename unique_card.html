  <style>

<body>
 <script type="module">
  import { createClient } from '@supabase/supabase-js'

  const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
  const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT5oy' // full anon key
  const supabase = createClient(supabaseUrl, supabaseKey)

  // Define which pages each subscription unlocks
  const subscriptionAccess = {
    "lunar diamond": [
      "curiosity.html",
      "familiar.html",
      "nine_lives.html",
      "pawprints.html",
      "rituallunar.html",
      "MysticalWeatherCalendar.html"
    ],
    "solar diamond": [
      "curiosity.html",
      "familiar.html",
      "nine_lives.html",
      "pawprints.html",
      "oraculum.html",
      "rituallunar.html",
      "solar.html",
      "MysticalWeatherCalendar.html"
    ],
    "cosmic diamond": [
      "curiosity.html",
      "familiar.html",
      "nine_lives.html",
      "pawprints.html",
      "rituallunar.html",
      "solar.html",
      "MysticalWeatherCalendar.html",
      "cosmic.html"
    ]
  }

  async function checkAccess(currentPage) {
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) {
      window.location.href = "login.html"
      return
    }

    const { data: user } = await supabase
      .from("users")
      .select("role, subscription, subscription_end")
      .eq("id", session.user.id)
      .single()

    let allowed = false
    const now = new Date()

    if (user.role === "admin") {
      allowed = true
    } else if (
      user.subscription &&
      subscriptionAccess[user.subscription]?.includes(currentPage) &&
      new Date(user.subscription_end) > now
    ) {
      allowed = true
    } else if (!user.subscription && currentPage === "curiosity.html") {
      // free tier: only curiosity.html
      allowed = true
    }

    if (!allowed) {
      document.querySelector(".console").innerHTML = `
        <h1>${currentPage} ✨</h1>
        <p class="message">Available only with the proper subscription.</p>
        <div class="data">
          This spread guides you along a balanced path of discovery. Unlocking it grants clarity,
          intuition, and guidance aligned with celestial cycles.
        </div>
        <p style="margin-top:20px;">
          🌌 Upgrade your subscription to access the full spread.
        </p>
      `;
    }
  }
  checkAccess("unique_card.html")
</script>

 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Curiosity Spread</title>
</head>
<body>
  <script type="module">
    import { createClient } from '@supabase/supabase-js'

    const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
    const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT5oy' // full anon key
    const supabase = createClient(supabaseUrl, supabaseKey)

    const subscriptionAccess = {
      "lunar diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","rituallunar.html","MysticalWeatherCalendar.html"],
      "solar diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","oraculum.html","rituallunar.html","solar.html","MysticalWeatherCalendar.html"],
      "cosmic diamond": ["curiosity.html","familiar.html","nine_lives.html","pawprints.html","rituallunar.html","solar.html","MysticalWeatherCalendar.html","Cosmic_console.html"]
    }

    async function checkAccess(currentPage) {
      const { data: { session } } = await supabase.auth.getSession()
      if (!session) {
        window.location.href = "login.html"
        return
      }

      const { data: user } = await supabase
        .from("users")
        .select("role, subscription")
        .eq("id", session.user.id)
        .single()

      let allowed = false
      if (user.role === "admin") {
        allowed = true
      } else if (user.subscription && subscriptionAccess[user.subscription]?.includes(currentPage)) {
        allowed = true
      } else if (!user.subscription && currentPage === "curiosity.html") {
        allowed = true // free tier: only curiosity.html
      }

      if (!allowed) {
        alert("Please subscribe to access this spread ✨")
        window.location.href = "subs.html"
      }
    }

    checkAccess("curiosity.html")
  </script>

  <h1>Your Card of the Day</h1>
  <div id="card-area"></div>
  <div id="card-name"></div>
  <div id="card-message"></div>

  <p style="margin-top:20px;">Would you like a deeper reading?</p>
  <button class="btn" onclick="navigate(true)">Yes</button>
  <button class="btn" onclick="navigate(false)">No</button>

  <script>
    // --- Decks ---
    const MajorArcana = [
      { name: "The Fool", src: "images/MajorArcana/TheFool.png" },
      { name: "The Magician", src: "images/MajorArcana/TheMagician.png" },
      { name: "The High Priestess", src: "images/MajorArcana/TheHighPriestess.png" },
      { name: "The Empress", src: "images/MajorArcana/TheEmpress.png" },
      { name: "The Emperor", src: "images/MajorArcana/TheEmperor.png" },
      { name: "The Lovers", src: "images/MajorArcana/TheLovers.png" },
      { name: "The Chariot", src: "images/MajorArcana/TheChariot.png" },
      { name: "The Strength", src: "images/MajorArcana/TheStrength.png" },
      { name: "The Hermit", src: "images/MajorArcana/TheHermit.png" },
      { name: "The Wheel of Fortune", src: "images/MajorArcana/TheWheelofFortune.png" },
      { name: "The Justice", src: "images/MajorArcana/TheJustice.png" },
      { name: "The Hanged Man", src: "images/MajorArcana/TheHangedMan.png" },
      { name: "The Death", src: "images/MajorArcana/TheDeath.png" },
      { name: "The Temperance", src: "images/MajorArcana/TheTemperance.png" },
      { name: "The Devil", src: "images/MajorArcana/TheDevil.png" },
      { name: "The Tower", src: "images/MajorArcana/TheTower.png" },
      { name: "The Star", src: "images/MajorArcana/TheStar.png" },
      { name: "The Moon", src: "images/MajorArcana/TheMoon.png" },
      { name: "The Sun", src: "images/MajorArcana/TheSun.png" },
      { name: "The Judgement", src: "images/MajorArcana/TheJudgement.png" },
      { name: "The World", src: "images/MajorArcana/TheWorld.png" }
    ];

    const Cups = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Cups`, src:`images/Cups/${n}OfCups.png`}));
    const Pentacles = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Pentacles`, src:`images/pentacles/${n}OfPentacles.png`}));
    const Swords = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Swords`, src:`images/swords/${n}OfSwords.png`}));
    const Wands = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"]
      .map(n=>({name:`${n} of Wands`, src:`images/wands/${n}OfWands.png`}));

    const minorArcana = [...Cups, ...Pentacles, ...Swords, ...Wands];
    const mixedDeck = [...MajorArcana, ...minorArcana];

    // --- Shuffle ---
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // --- Detect deck from URL ---
    const params = new URLSearchParams(window.location.search);
    const deckChoice = (params.get("deck") || "mixed").toLowerCase();

    let deck;
    if (deckChoice === "major") deck = [...MajorArcana];
    else if (deckChoice === "minor") deck = [...minorArcana];
    else deck = [...mixedDeck];

    // --- Select ONE card only ---
    const selectedCard = shuffle(deck)[0];

    // --- Show card ---
    document.getElementById("card-area").innerHTML = `<img id="card-image" src="${selectedCard.src}" alt="${selectedCard.name}">`;
    document.getElementById("card-name").innerText = selectedCard.name;

    // --- Generate interpretation ---
    const openings = [
      "The energy surrounding your path reveals",
      "The cosmos whispers that",
      "A hidden force suggests",
      "The tarot shows that"
    ];
    const closings = [
      "Reflect and embrace the message.",
      "Let the guidance settle within you.",
      "Observe how this insight resonates.",
      "Trust the universe's gentle nudges."
    ];
    const rand = arr => arr[Math.floor(Math.random() * arr.length)];
    document.getElementById("card-message").innerText = `${rand(openings)} ${selectedCard.name}. ${rand(closings)}`;

    // --- Navigation buttons ---
    function navigate(choice) {
      if (choice) window.location.href = "subs.html";
      else window.location.href = "index.html";
    }
  </script>
</body>
</html>
