      padding: 20px;

      color: #333;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5em;
      color: black; /* Title color */
      font-family: 'Cinzel', serif; /* Google Font for title only */
    }

    #card-image {
      width: 300px;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      margin-bottom: 20px;

    #card-name {

      margin-top: 10px;
      color: #444;
    }

    #card-meaning, #card-advice {
      font-size: 1.2em;
      margin-top: 10px;
    }

    .btn {
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #444;
      color: white;
    }

    .btn:hover {
      background-color: #666;
    }

    /* 📱 Responsivo */
    @media (max-width: 600px) {
      #card-image {
        width: 220px;
      }
      h1 {
        font-size: 2em;
      }
      #card-name {
