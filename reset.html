<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <style>
    body {
      background-color: #000;
      font-family: 'Cinzel', serif;
      color: #fff;
      text-align: center;
    }
    .reset-box {
      background-color: #fff;
      color: #000;
      padding: 20px;
      margin: 80px auto;
      width: 300px;
      border-radius: 8px;
    }
    .reset-box input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    .reset-box button {
      margin-top: 15px;
      padding: 10px 20px;
      background-color: orange;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <form class="reset-box" method="POST" action="https://formspree.io/f/mbdzljpz">
    <h2>Reset Password</h2>
    <label for="email">Enter your email:</label>
    <input type="email" id="email" name="email" required>
    <button type="submit">Send Reset Link</button>
  </form>
</body>
</html>
