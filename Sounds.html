<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sounds from the Sky — Cosmic Signal Strength</title>
  <style>
    body {
      background-color: #000;   /* Black background */
      color: #fff;              /* White text */
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h1, h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    .metrics {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
    }
    .metric-box {
      border: 1px solid #fff;
      padding: 15px;
      border-radius: 8px;
      width: 25%;
      text-align: center;
    }
    .overlay {
      margin-top: 30px;
      font-style: italic;
      text-align: center;
    }
    audio {
      display: block;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <h1>🌌 Sounds from the Sky</h1>
  <h2>Cosmic Signal Strength Meter</h2>

  <!-- Reliability Metrics -->
  <div class="metrics">
    <div class="metric-box">
      <h3>Signal Clarity</h3>
      <p>78%</p>
    </div>
    <div class="metric-box">
      <h3>Aurora Probability</h3>
      <p>High</p>
    </div>
    <div class="metric-box">
      <h3>Shield Strength</h3>
      <p>65%</p>
    </div>
  </div>

  <!-- Mystical Overlay -->
  <div class="overlay">
    <p>The sky hums with hidden power. Signals rush through the cosmic currents. The shield sparkles with celestial light.</p>
  </div>

  <!-- Audio Player -->
  <audio controls>
    <source src="cosmic_mix.wav" type="audio/wav">
    Your browser does not support the audio element.
  </audio>
</body>
</html>
