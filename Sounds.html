<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sounds of the Sky</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0c10;
      color: #c5c6c7;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #66fcf1;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 20px 0;
    }
    span {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #45a29e;
    }
    audio {
      width: 300px;
    }
  </style>
</head>
<body>
  <h1>✨ Sounds of the Sky ✨</h1>
  <p>Explore cosmic harmonies and plasma shimmerings from above.</p>

  <ul id="sounds-menu">
    <!-- Cosmic Mix entry -->
    <li>
      <span>Cosmic Mix</span>
      <audio controls>
        <source src="cosmic_mix.wav" type="audio/wav">
        Your browser does not support the audio element.
      </audio>
    </li>

    <!-- Plasma Shimmer entry -->
    <li>
      <span>Plasma Shimmer</span>
      <audio controls>
        <source src="plasma_shimmer.wv" type="audio/wav">
        Your browser does not support the audio element.
      </audio>
    </li>
  </ul>
</body>
</html>
