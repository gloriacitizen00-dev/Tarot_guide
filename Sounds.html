<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmic Signal Strength Meter</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b0c10; color: #c5c6c7; }
    .metric { margin: 1em 0; padding: 1em; background: #1f2833; border-radius: 8px; }
    .metric h2 { color: #66fcf1; }
    .score { font-size: 1.5em; font-weight: bold; }
    .sound { margin: 1em 0; padding: 1em; background: #1f2833; border-radius: 8px; }
    .sound h2 { color: #45a29e; }
    button { background: #66fcf1; border: none; padding: 0.5em 1em; border-radius: 4px; cursor: pointer; }
    button:hover { background: #45a29e; }
  </style>
</head>
<body>
  <h1>Sounds from the Sky</h1>
  
  <!-- Metrics -->
  <div class="metric">
    <h2>Plasma Density</h2>
    <p class="score" id="plasmaScore">Loading...</p>
  </div>

  <div class="metric">
    <h2>Signal Clarity</h2>
    <p class="score" id="signalClarity">Loading...</p>
  </div>

  <div class="metric">
    <h2>Aurora Probability</h2>
    <p class="score" id="auroraProb">Loading...</p>
  </div>

  <!-- Sounds -->
 <!-- Sounds -->
<div class="sound">
  <h2>Cosmic Mix</h2>
  <audio id="cosmicMix" src="assets/cosmic_mix.wav"></audio>
  <button onclick="document.getElementById('cosmicMix').play()">Play Cosmic Mix</button>
</div>

<div class="sound">
  <h2>Plasma Shimmer</h2>
  <audio id="plasmaShimmer" src="assets/plasma_shimmer.wav"></audio>
  <button onclick="document.getElementById('plasmaShimmer').play()">Play Plasma Shimmer</button>
</div>

<div class="sound">
  <h2>Magnetosphere Groove</h2>
  <audio id="magnetosphereGroove" src="assets/magnetosphere_groove.wav"></audio>
  <button onclick="document.getElementById('magnetosphereGroove').play()">Play Magnetosphere Groove</button>
</div>

<div class="sound">
  <h2>Plasma Wave</h2>
  <audio id="plasmaWave" src="assets/plasma_wave.wav"></audio>
  <button onclick="document.getElementById('plasmaWave').play()">Play Plasma Wave</button>
</div>

<div class="sound">
  <h2>Aurora Elegy</h2>
  <audio id="auroraElegy" src="assets/aurora_elegy.wav"></audio>
  <button onclick="document.getElementById('auroraElegy').play()">Play Aurora Elegy</button>
</div>

<div class="sound">
  <h2>Solar Wind</h2>
  <audio id="solarWind" src="assets/solar_wind_refined.wav"></audio>
  <button onclick="document.getElementById('solarWind').play()">Play Solar Wind</button>
</div>

<div class="sound">
  <h2>Signal Strength Voice</h2>
  <audio id="signalStrengthVoice" src="assets/signal_strength_voice.wav"></audio>
  <button onclick="document.getElementById('signalStrengthVoice').play()">Play Signal Strength Voice</button>
</div>



  <script>
    // Placeholder: replace with live fetch from NOAA/NASA APIs
    const plasmaDensity = 5.2; // example TEC value
    const signalClarity = 78;  // example %
    const auroraProb = "High";

    document.getElementById("plasmaScore").textContent = plasmaDensity + " TEC";
    document.getElementById("signalClarity").textContent = signalClarity + "%";
    document.getElementById("auroraProb").textContent = auroraProb;
  </script>
</body>
</html>
