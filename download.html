<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Descargar Productos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background-color: #f5f5f5;
    }

    h1 {
      color: #6a5acd;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    /* Purple buttons like catalog */
    .btn {
      background-color: #6a5acd;
      color: white;
      padding: 15px 30px;
      border-radius: 30px;
      border: none;
      margin: 15px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #5a4acb;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

 <script>
  // ✅ Check if user has paid
  const paid = localStorage.getItem('paid');

  if (!paid) {
    // User hasn't paid, show warning
    document.body.innerHTML = `
      <p style="font-size:18px; color:#6a5acd;">
        You have not completed a purchase. Please return to the store.
      </p>
      <a class="btn" href="catalog.html">Back to the store</a>
    `;
  } else {
    // User paid, show download buttons
    document.body.innerHTML = `
      <h1>Thank you for your purchase! Enjoy your Tarot products.</h1>
      <p>Click the buttons below to download your products:</p>

      <a href="https://drive.google.com/uc?export=download&id=1H8yPgVSffKURCIEUto8zk-ziuRe5FPG4" class="btn" download>
        Download Tarot Guide Ebook
      </a>
      
      <a href="https://drive.google.com/drive/folders/1yE0mKuEnwHANKkI7HFECWrcKtVgidxzh?usp=drive_link" class="btn" target="_blank">
        Download Tarot Deck (78 cards)
      </a>

      <br><br>
      <a class="btn" href="catalog.html">Back to the store</a>
      `;

        // remove paid flag after showing download
        localStorage.removeItem('paid');
  }
</script>

</body>
</html>
