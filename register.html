<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>✨Maneko Neki Tarot Registration ✨</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Bodoni Moda', serif;
      background-color: #6a0dad; /* medium purple */
      margin: 0;
      padding-top: 40px;
      text-align: center;
      color: #f5f0fa;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 45px;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 2px 2px 6px rgba(255,255,255,0.6);
    }
    .register-box {
      background-color: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(255,255,255,0.4);
      width: 420px;
      margin: auto;
      text-align: left;
    }
    .register-box label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #2b0a44;
    }
    .register-box input,
    .register-box select {
      width: calc(100% - 40px); /* padding inside container */
      padding: 10px;
      margin: 5px 20px; /* balanced left/right margin */
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .register-box button {
      margin: 20px 20px 0 20px;
      width: calc(100% - 40px);
      padding: 12px;
      background-color: #a678d1; /* light purple */
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .register-box button:hover {
      background-color: #8b5fbf;
    }
    .error {
      color: red;
      font-size: 14px;
      margin-left: 20px;
    }
    .top-menu {
      margin-bottom: 20px;
    }
    .top-menu a {
      display:inline-block; 
      padding:10px 20px; 
      background-color:#a678d1; 
      color:white; 
      font-weight:bold;
      text-decoration:none; 
      font-family:'Cinzel', serif; 
      font-size:16px;
      border-radius:5px;
    }
    .top-menu a:hover {
      background-color:#8b5fbf;
    }
  </style>
</head>
<body>
  <div class="top-menu">
    <a href="index.html">⬅️ Back to Menu</a>
  </div>

  <h1>✨ Tarot & Maneko Neki Registration ✨</h1>

  <form id="register-form" class="register-box">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>
    <div id="username-error" class="error"></div>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="country">Country</label>
    <input type="text" id="country" name="country" required>

    <label for="language">Preferred Language</label>
    <select id="language" name="language" required>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
    </select>

    <label>
      <input type="checkbox" id="consent" name="consent" required>
      I agree to receive a registration email with my account information
    </label>
    <label>
      <input type="checkbox" id="terms" name="terms" required>
      I accept the <a href="terms.html" target="_blank" style="color:#2b0a44; text-decoration:underline;">Terms and Conditions</a>
    </label>

    <button type="submit">Register</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
    const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT...' // your full publishable key
    const supabase = createClient(supabaseUrl, supabaseKey)

    const form = document.getElementById('register-form')
    const usernameError = document.getElementById('username-error')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const username = document.getElementById('username').value
      const name = document.getElementById('name').value
      const country = document.getElementById('country').value
      const language = document.getElementById('language').value

      // Check if username already exists
      const { data: existingUser, error: checkError } = await supabase
        .from('users')
        .select('username')
        .eq('username', username)

      if (checkError) {
        alert('Error checking username: ' + checkError.message)
        return
      }
      if (existingUser && existingUser.length > 0) {
        usernameError.textContent = '⚠️ This username is already taken, please choose another.'
        return
      }

      // Create account in Auth
      const { data, error: authError } = await supabase.auth.signUp({
        email,
        password
      })
      if (authError) {
        alert('Error creating account: ' + authError.message)
        return
      }
      const user = data.user

      // Insert into users table
      const { error: insertError } = await supabase
        .from('users')
        .insert([
          {
            id: user.id,
            username,
            email,
            name,
            country,
            language,
            subscription: null,
            role: "user"
          }
        ])
      if (insertError) {
        alert('Error saving user: ' + insertError.message)
        return
      }

      // Success → redirect to subs.html
      alert('🎉 Registration successful, welcome ' + username + '!')
      form.reset()
      window.location.href = "subs.html"
    })
  </script>
</body>
</html>
