<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
</head>
<body>
  <h2>Crear cuenta</h2>
  <form id="register-form" class="register-box">
    <input type="text" id="username" name="username" placeholder="Usuario" required>
    <input type="email" id="email" name="email" placeholder="Correo" required>
    <input type="password" id="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Registrarse</button>
  </form>

  <!-- EmailJS -->
  <script type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init("F9szNboeOwjOOJ_Gw"); // tu public key de EmailJS
    })();
  </script>

  <!-- Supabase + lógica de registro -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
    const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT...' // tu publishable key completa
    const supabase = createClient(supabaseUrl, supabaseKey)

    const form = document.getElementById('register-form')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const username = document.getElementById('username').value

      // 1. Verificar si el username ya existe
      const { data: existingUser, error: checkError } = await supabase
        .from('users')
        .select('username')
        .eq('username', username)

      if (checkError) {
        alert('Error verificando el username: ' + checkError.message)
        return
      }

      if (existingUser && existingUser.length > 0) {
        alert('⚠️ Ese nombre ya está en uso, por favor elige otro.')
        return
      }

      // 2. Crear cuenta en Auth
      const { data, error: authError } = await supabase.auth.signUp({
        email,
        password
      })

      if (authError) {
        alert('Error creando la cuenta: ' + authError.message)
        return
      }

      const user = data.user

      // 3. Insertar en la tabla users
      const { error: insertError } = await supabase
        .from('users')
        .insert([
          {
            id: user.id,
            username,
            email,
            subscription: null, // o "lunar diamond" si quieres dar un plan por defecto
            role: "user"        // rol por defecto
          }
        ])

      if (insertError) {
        alert('Error guardando el usuario: ' + insertError.message)
        return
      }

      // 4. Enviar correo con EmailJS
      try {
        await emailjs.sendForm('service_pqfmwsc', 'template_welcome123', form)
        alert("✨ Bienvenido! Tu correo de registro ha sido enviado.")
      } catch (error) {
        alert("Oops... algo salió mal con el correo: " + JSON.stringify(error))
      }

      // 5. Registro exitoso → redirigir a login
      alert('🎉 Registro exitoso, bienvenido ' + username + '!')
      form.reset()
      window.location.href = "login.html"
    })
  </script>
</body>
</html>
