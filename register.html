<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Registration ✨</title>
  <style>
body { 
  font-family: 'Bodoni Moda', serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  background: linear-gradient(135deg, #6a0dad, #b57edc, #4b0082);
  background-attachment: fixed;
  color: #4b1d73;
  padding-top: 30px;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: 42px; /* más equilibrado */
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(255,255,255,0.6);
}

.register-box {
  background: rgba(255,255,255,0.85);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
  width: 90%;
  max-width: 350px;
  margin-bottom: 30px;
}

.register-box input, 
.register-box select {
  width: 90%;
  margin: 5px auto;   /* centra horizontalmente */
  display: block;     /* asegura que se comporten como bloques */
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box; /* evita que el padding haga que se desborden */
}


.register-box button,
.menu-button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background-color: #b57edc; 
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.register-box button:hover,
.menu-button:hover {
  background-color:#9b59b6;
}

/* Responsividad */
@media (max-width: 768px) {
  h1 {
    font-size: 32px;
  }
  .register-box {
    padding: 15px;
  }
}

@media (max-width: 480px) {
  h1 {
    font-size: 26px;
  }
  .register-box {
    width: 95%;
    padding: 12px;
  }
  .register-box button,
  .menu-button {
    font-size: 14px;
    padding: 10px;
  }
}
</style>
</head>
<body>
  <h1>🔮 Registration Portal of the Maneko Neki 🔮</h1>

  <div style="margin-bottom:20px;">
    <a href="index.html" class="menu-button">🐾 Back to Menu</a>
  </div>

  <form id="register-form" class="register-box">
  <label for="username">Username:</label>
  <input type="text" id="username" name="username" required>
  <div id="username-error" class="error"></div>

  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required>

  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="country">Country:</label>
  <input type="text" id="country" name="country" required>

  <label for="language">Preferred Language:</label>
  <select id="language" name="language" required>
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
  </select>

  <label>
    <input type="checkbox" name="consent" required>
    I agree to receive a welcome email with account information
  </label>

  <label>
    <input type="checkbox" name="terms" required>
    I accept the <a href="terms.html" target="_blank" style="color:black; text-decoration:underline;">Terms and Conditions</a>
  </label>

  <button type="submit">Register</button>
</form>

<script type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script type="text/javascript">
  (function(){
    emailjs.init("F9szNboeOwjOOJ_Gw"); 
  })();

  const form = document.querySelector('.register-box');
  form.addEventListener('submit', function(event) {
    event.preventDefault();

    emailjs.sendForm('service_pqfmwsc', 'template_welcome123', this)
      .then(function() {
        alert("✨ Welcome! Your registration email has been sent.");
        window.location.href = "index.html"; // redirige al menú
      }, function(error) {
        alert("Oops... something went wrong: " + JSON.stringify(error));
      });
  });
</script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  // Tu URL y clave pública de Supabase
  const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
  const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT5oy'
  const supabase = createClient(supabaseUrl, supabaseKey)

  const form = document.getElementById('register-form')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    const email = document.getElementById('email').value
    const password = document.getElementById('password').value
    const username = document.getElementById('username').value

    // 1. Verificar si el username ya existe
    const { data: existingUser, error: checkError } = await supabase
      .from('users')
      .select('username')
      .eq('username', username)

    if (checkError) {
      alert('Error verificando el username: ' + checkError.message)
      return
    }

    if (existingUser.length > 0) {
      alert('⚠️ Ese nombre ya está en uso, por favor elige otro.')
      return
    }

    // 2. Crear cuenta en Auth
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password
    })

    if (authError) {
      alert('Error creando la cuenta: ' + authError.message)
      return
    }

    // 3. Insertar en la tabla users
    const { error: insertError } = await supabase
      .from('users')
      .insert([
        {
          id: authData.user.id,
          username,
          email,
          subscription: false
        }
      ])

    if (insertError) {
      alert('Error guardando el usuario: ' + insertError.message)
      return
    }

    alert('🎉 Registro exitoso, bienvenido ' + username + '!')
    form.reset()
  })
</script>

  
</body>
</html>
