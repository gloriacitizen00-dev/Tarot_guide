<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Registration ✨</title>
  <style>
body { 
  font-family: 'Bodoni Moda', serif;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  text-align: center;
  background: linear-gradient(135deg, #6a0dad, #b57edc, #4b0082);
  background-attachment: fixed;
  color: #4b1d73;
  padding-top: 30px;
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: 42px; /* más equilibrado */
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(255,255,255,0.6);
}

.register-box {
  background: rgba(255,255,255,0.85);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
  width: 90%;
  max-width: 350px;
  margin-bottom: 30px;
}

.register-box input, 
.register-box select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.register-box button,
.menu-button {
  margin-top: 15px;
  width: 100%;
  padding: 12px;
  background-color: #b57edc; 
  color: white;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(255,255,255,0.6);
}

.register-box button:hover,
.menu-button:hover {
  background-color:#9b59b6;
}

/* Responsividad */
@media (max-width: 768px) {
  h1 {
    font-size: 32px;
  }
  .register-box {
    padding: 15px;
  }
}

@media (max-width: 480px) {
  h1 {
    font-size: 26px;
  }
  .register-box {
    width: 95%;
    padding: 12px;
  }
  .register-box button,
  .menu-button {
    font-size: 14px;
    padding: 10px;
  }
}
</style>
</head>
<body>
  <h1>🔮 Registration Portal of the Maneko Neki 🔮</h1>

  <div style="margin-bottom:20px;">
    <a href="index.html" class="menu-button">🐾 Back to Menu</a>
  </div>

  <form class="register-box" method="POST" action="https://formspree.io/f/xjgaeejp">
  <label for="username">Username:</label>
  <input type="text" id="username" name="username" required>
  <div id="username-error" class="error"></div>

  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required>

  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>

  <label for="country">Country:</label>
  <input type="text" id="country" name="country" required>

  <label for="language">Preferred Language:</label>
  <select id="language" name="language" required>
    <option value="en">English</option>
    <option value="es">Spanish</option>
    <option value="fr">French</option>
  </select>

  <label>
    <input type="checkbox" name="consent" required>
    I agree to receive a welcome email with account information
  </label>

  <label>
    <input type="checkbox" name="terms" required>
    I accept the <a href="terms.html" target="_blank" style="color:black; text-decoration:underline;">Terms and Conditions</a>
  </label>

  <button type="submit">Register</button>
</form>

</body>
</html>
