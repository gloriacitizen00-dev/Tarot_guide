<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro ✨ Tarot & Maneko Neki ✨</title>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Bodoni Moda', serif;
      background: url('https://gloriacitizen00-dev.github.io/Tarot_guide/Fifth.png') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding-top: 40px;
      text-align: center;
      color: #4b1d73;
    }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: 60px;
      margin-bottom: 20px;
      color: #2b0a44;
      text-shadow: 2px 2px 6px rgba(255,255,255,0.6);
    }
    .register-box {
      background-color: rgba(255,255,255,0.85);
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(75,29,115,0.5);
      width: 400px;
      margin: auto;
    }
    .register-box label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
      color: #2b0a44;
    }
    .register-box input,
    .register-box select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .register-box button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      background-color: #a678d1; /* light purple */
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .register-box button:hover {
      background-color: #8b5fbf;
    }
    .error {
      color: red;
      font-size: 14px;
      margin-top: 5px;
    }
    .top-menu {
      margin-bottom: 20px;
    }
    .top-menu a {
      display:inline-block; 
      padding:10px 20px; 
      background-color:#a678d1; 
      color:white; 
      font-weight:bold;
      text-decoration:none; 
      font-family:'Cinzel', serif; 
      font-size:16px;
      border-radius:5px;
    }
    .top-menu a:hover {
      background-color:#8b5fbf;
    }
  </style>
</head>
<body>
  <div class="top-menu">
    <a href="index.html">⬅️ Volver al Menú</a>
  </div>

  <h1>✨ Registro Tarot & Maneko Neki ✨</h1>

  <form id="register-form" class="register-box">
    <label for="username">Usuario</label>
    <input type="text" id="username" name="username" required>
    <div id="username-error" class="error"></div>

    <label for="password">Contraseña</label>
    <input type="password" id="password" name="password" required>

    <label for="name">Nombre</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Correo</label>
    <input type="email" id="email" name="email" required>

    <label for="country">País</label>
    <input type="text" id="country" name="country" required>

    <label for="language">Idioma preferido</label>
    <select id="language" name="language" required>
      <option value="es">Español</option>
      <option value="en">Inglés</option>
      <option value="fr">Francés</option>
    </select>

    <label>
      <input type="checkbox" id="consent" name="consent" required>
      Acepto recibir un correo de registro con la información de mi cuenta
    </label>
    <label>
      <input type="checkbox" id="terms" name="terms" required>
      Acepto los <a href="terms.html" target="_blank" style="color:#2b0a44; text-decoration:underline;">Términos y Condiciones</a>
    </label>

    <button type="submit">Registrarse</button>
  </form>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://gpkxsdiywtaipopqnjsy.supabase.co'
    const supabaseKey = 'sb_publishable_yLaut4M-4QFJiZm-0Adbtg_i9tcT...' // tu publishable key completa
    const supabase = createClient(supabaseUrl, supabaseKey)

    const form = document.getElementById('register-form')
    const usernameError = document.getElementById('username-error')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = document.getElementById('email').value
      const password = document.getElementById('password').value
      const username = document.getElementById('username').value
      const name = document.getElementById('name').value
      const country = document.getElementById('country').value
      const language = document.getElementById('language').value

      // Validación de username único
      const { data: existingUser, error: checkError } = await supabase
        .from('users')
        .select('username')
        .eq('username', username)

      if (checkError) {
        alert('Error verificando el usuario: ' + checkError.message)
        return
      }
      if (existingUser && existingUser.length > 0) {
        usernameError.textContent = '⚠️ Ese nombre ya está en uso, por favor elige otro.'
        return
      }

      // Crear cuenta en Auth
      const { data, error: authError } = await supabase.auth.signUp({
        email,
        password
      })
      if (authError) {
        alert('Error creando la cuenta: ' + authError.message)
        return
      }
      const user = data.user

      // Insertar en tabla users
      const { error: insertError } = await supabase
        .from('users')
        .insert([
          {
            id: user.id,
            username,
            email,
            name,
            country,
            language,
            subscription: null,
            role: "user"
          }
        ])
      if (insertError) {
        alert('Error guardando el usuario: ' + insertError.message)
        return
      }

      // Registro exitoso → redirigir a subs.html
      alert('🎉 Registro exitoso, bienvenido ' + username + '!')
      form.reset()
      window.location.href = "subs.html"
    })
  </script>
</body>
</html>
