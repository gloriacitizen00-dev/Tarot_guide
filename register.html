<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <style>
    body {
      background-color: #fdf5e6; /* cream */
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .register-box {
      background-color: #fffdd0; /* cream */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 350px;
    }
    .register-box label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    .register-box input, 
    .register-box select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .register-box button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      background-color: #d2691e; /* warm tone */
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }
    .register-box button:hover {
      background-color: #a0522d;
    }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <!-- Back to Menu button -->
    <div style="margin-bottom:20px;">
      <a href="index.html" 
         style="display:inline-block; 
                padding:10px 20px; 
                background-color:#111; 
                color:#fff; 
                text-decoration:none; 
                border-radius:6px; 
                font-family:'Cinzel', serif; 
                font-size:16px;">
        🐾 Back to Menu
      </a>
    </div>
  
  <form class="register-box" method="POST" action="https://formspree.io/f/mbdzljpz">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="country">Country:</label>
    <input type="text" id="country" name="country" required>

    <label for="language">Preferred Language:</label>
    <select id="language" name="language" required>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
    </select>

    <label>
      <input type="checkbox" name="consent" required>
      I agree to receive a welcome email with account information
    </label>

    <label>
      <input type="checkbox" name="terms" required>
      I accept the <a href="terms.html" target="_blank" style="color:black; text-decoration:underline;">Terms and Conditions</a>
    </label>

    <button type="submit">Register</button>
  </form>

  <script>
    const form = document.querySelector('.register-box');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const response = await fetch(form.action, {
        method: form.method,
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        // Show confirmation before redirect
        alert("Welcome ✨ Your registration is complete!");
        window.location.href = "index.html";
      } else {
        alert("There was a problem, please try again.");
      }
    });
  </script>
</body>
</html>
