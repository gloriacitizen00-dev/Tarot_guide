<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Calendar</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#070b14;
  color:white;
  text-align:center;
  padding:20px;
}

h1 {
  color:#9ecbff;
}

.grid {
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:10px;
  max-width:900px;
  margin:20px auto;
}

.day {
  background:rgba(255,255,255,0.05);
  border-radius:12px;
  padding:10px;
  transition:0.3s;
  cursor:pointer;
}

.day:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(120,180,255,0.4);
}

img {
  width:50px;
  margin-top:5px;
  transition:0.5s ease;
}

.date {
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>🌙 Monthly Moon Calendar</h1>

<div class="grid" id="calendar"></div>

<script>
// 🌙 Moon phase generator (29.53 day cycle)
function getMoonPhase(day) {
  const phase = (day % 29.53);

  if (phase < 1.845) return "New Moon";
  if (phase < 5.536) return "Waxing Crescent";
  if (phase < 9.228) return "First Quarter";
  if (phase < 12.919) return "Waxing Gibbous";
  if (phase < 16.61) return "Full Moon";
  if (phase < 20.302) return "Waning Gibbous";
  if (phase < 23.993) return "Last Quarter";
  return "Waning Crescent";
}

// 🌙 Simple icons (you can replace later)
const icons = {
  "New Moon": "🌑",
  "Waxing Crescent": "🌒",
  "First Quarter": "🌓",
  "Waxing Gibbous": "🌔",
  "Full Moon": "🌕",
  "Waning Gibbous": "🌖",
  "Last Quarter": "🌗",
  "Waning Crescent": "🌘"
};

const calendar = document.getElementById("calendar");

// 📅 Generate 30-day calendar
for (let i = 1; i <= 30; i++) {
  const phase = getMoonPhase(i);

  const div = document.createElement("div");
  div.className = "day";

  div.innerHTML = `
    <div class="date">Day ${i}</div>
    <div style="font-size:22px">${icons[phase]}</div>
    <div style="font-size:12px">${phase}</div>
  `;

  calendar.appendChild(div);
}
</script>

</body>
</html>
