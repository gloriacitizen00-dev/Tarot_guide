<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-image: url("about.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* deja espacio para el footer */
    }
    h1, p {
      color: white;
      text-align: center;
      padding-top: 20px;
    }
    footer {
      background: rgba(0,0,0,0.6); /* fondo semitransparente */
      padding: 15px;
      text-align: center;
    }
    footer a {
      display: inline-block;
      color: white;
      font-weight: bold; /* letras en negrita */
      text-decoration: none;
      margin: 0 15px;
      padding: 10px 20px;
      background-color: #0A3D62; /* celeste oscuro */
      border-radius: 24px; /* curva pronunciada */
      transition: background 0.3s, transform 0.2s;
    }
    footer a:hover {
      background-color: #1E90FF; /* azul más brillante al pasar el mouse */
      color: white;
      transform: scale(1.05); /* efecto sutil de agrandamiento */
    }
  </style>
</head>
<body>

  <footer>
    <a href="Vission.html">Mission</a>
    <a href="Values.html">Values</a>
    <a href="The_team.html">Team</a>
    <a href="Familiar.html">Animal Guide</a>
  </footer>
</body>
</html>
