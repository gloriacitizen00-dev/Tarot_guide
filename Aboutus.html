<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Esto asegura que la página se adapte al ancho del dispositivo -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    img {
      max-width: 100%;   /* ocupa todo el ancho disponible */
      height: auto;      /* mantiene proporción */
      display: block;    /* elimina espacios extra */
      margin: 0 auto;    /* centra la imagen */
    }
  </style>
</head>
<body>
  <h1>Contacto</h1>

  <!-- Aquí va tu imagen -->
  <img src="contact.png" alt="Imagen de contacto">

  <p>Bienvenido a la página de contacto.</p>
</body>
</html>
