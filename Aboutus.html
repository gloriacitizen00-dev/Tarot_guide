<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-image: url("about.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* deja espacio para el footer */
    }
    h1, p {
      color: white;
      text-align: center;
      padding-top: 20px;
    }
    footer {
      background: rgba(0,0,0,0.6); /* fondo semitransparente */
      padding: 15px;
      text-align: center;
    }
    footer a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      padding: 8px 16px;
      border: 1px solid white;
      border-radius: 5px;
      transition: background 0.3s;
    }
    footer a:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <h1>Bienvenidos a Neuromystia</h1>
  <p>Un espacio de conexión, guía y creatividad</p>

  <footer>
    <a href="#">Mission</a>
    <a href="#">Values</a>
    <a href="#">Team</a>
    <a href="#">Animal Guide</a>
  </footer>
</body>
</html>
