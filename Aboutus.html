<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-image: url("About.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    h1, p {
      color: white;
      text-align: center;
      padding-top: 20px;
    }
    footer {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      text-align: center;
    }
    footer a {
      display: inline-block;
      color: white;
      font-weight: bold;
      text-decoration: none;
      margin: 0 12px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #0A3D62, #1B4F72); /* celeste oscuro con degradado */
      border-radius: 30px; /* más redondeado */
      box-shadow: 0 0 12px rgba(30,144,255,0.6); /* aura luminosa */
      transition: all 0.3s ease;
    }
    footer a:hover {
      background: linear-gradient(135deg, #1E90FF, #4682B4); /* azul brillante al hover */
      transform: scale(1.08); /* efecto de expansión */
      box-shadow: 0 0 18px rgba(30,144,255,0.9); /* más brillo */
    }
  </style>
</head>
  
<body>
  <footer>
    <a href="Vission.html">Mission</a>
    <a href="Values.html">Values</a>
    <a href="The_team.html">Team</a>
    <a href="Familiar.html">Animal Guide</a>
    <a href="index.html">Main Page</a>
  </footer>
</body>
</html>
