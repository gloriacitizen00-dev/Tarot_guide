<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Calendar - March</title>

<style>
  body {
    background-color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  .day {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    min-height: 120px;
    text-align: center;
  }

  .date {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .blood-moon {
    width: 40px;
    height: 40px;
    background-color: red;
    border-radius: 50%;
    margin: 5px auto;
  }

  .aurora {
    width: 100px;
    height: 20px;
    background: linear-gradient(180deg, #00ff99, #00ccff);
    border-radius: 50% / 50%;
    margin: 5px auto;
  }

  .stars {
    color: gold;
    font-size: 18px;
    display: block;
  }

  .tooltip {
    font-size: 12px;
    margin-top: 5px;
  }
</style>
</head>

<body>

<h1>Aurora Calendar - March</h1>

<div class="calendar">

<div class="day" data-day="1"><div class="date">1</div></div>
<div class="day" data-day="2"><div class="date">2</div></div>
<div class="day" data-day="3"><div class="date">3</div></div>
<div class="day" data-day="4"><div class="date">4</div></div>
<div class="day" data-day="5"><div class="date">5</div></div>
<div class="day" data-day="6"><div class="date">6</div></div>
<div class="day" data-day="7"><div class="date">7</div></div>
<div class="day" data-day="8"><div class="date">8</div></div>
<div class="day" data-day="9"><div class="date">9</div></div>
<div class="day" data-day="10"><div class="date">10</div></div>
<div class="day" data-day="11"><div class="date">11</div></div>
<div class="day" data-day="12"><div class="date">12</div></div>
<div class="day" data-day="13"><div class="date">13</div></div>
<div class="day" data-day="14"><div class="date">14</div></div>
<div class="day" data-day="15"><div class="date">15</div></div>
<div class="day" data-day="16"><div class="date">16</div></div>
<div class="day" data-day="17"><div class="date">17</div></div>
<div class="day" data-day="18"><div class="date">18</div></div>
<div class="day" data-day="19"><div class="date">19</div></div>
<div class="day" data-day="20"><div class="date">20</div></div>
<div class="day" data-day="21"><div class="date">21</div></div>
<div class="day" data-day="22"><div class="date">22</div></div>
<div class="day" data-day="23"><div class="date">23</div></div>
<div class="day" data-day="24"><div class="date">24</div></div>
<div class="day" data-day="25"><div class="date">25</div></div>
<div class="day" data-day="26"><div class="date">26</div></div>
<div class="day" data-day="27"><div class="date">27</div></div>
<div class="day" data-day="28"><div class="date">28</div></div>
<div class="day" data-day="29"><div class="date">29</div></div>
<div class="day" data-day="30"><div class="date">30</div></div>

</div>

<script>
fetch("aurora_calendar_march.json")
  .then(response => response.json())
  .then(data => {
    for (const day in data) {
      const dayBox = document.querySelector(`.day[data-day='${day}']`);
      if (!dayBox) continue;

      const info = data[day];

      if (info.event === "Blood Moon") {
        dayBox.innerHTML += `
          <div class="blood-moon"></div>
          <div class="tooltip">Blood Moon</div>
        `;
      }

      if (info.aurora) {
        dayBox.innerHTML += `
          <div class="aurora"></div>
          <div class="tooltip">Aurora Likely</div>
        `;
      }

      if (info.meteor) {
        dayBox.innerHTML += `
          <div class="stars">✨</div>
          <div class="tooltip">Meteor Shower</div>
        `;
      }

       if (info.mystical) {
        dayBox.innerHTML += `
          <div class="tooltip">${info.mystical}</div>
        `;
       }
     
  });
</script>

</body>
</html>
