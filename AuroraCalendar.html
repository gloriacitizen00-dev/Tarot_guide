<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Live Space Weather</title>

<style>
  body {
    background-color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }

  .day {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    min-height: 120px;
    text-align: center;
  }

  .date {
    font-weight: bold;
    margin-bottom: 10px;
  }

  .aurora {
    width: 100px;
    height: 20px;
    background: linear-gradient(180deg, #00ff99, #00ccff);
    border-radius: 50% / 50%;
    margin: 5px auto;
  }

  .blood-moon {
    width: 40px;
    height: 40px;
    background-color: red;
    border-radius: 50%;
    margin: 5px auto;
  }

  .stars {
    color: gold;
    font-size: 18px;
  }

  .tooltip {
    font-size: 12px;
    margin-top: 5px;
  }
</style>
</head>

<body>

<h1 id="monthTitle"></h1>

<div class="calendar" id="calendar"></div>

<script>
// ----------------------------
// 1️⃣ Detect Current Month
// ----------------------------
const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

const monthNames = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

document.getElementById("monthTitle").innerText =
  "Aurora Space Weather - " + monthNames[month] + " " + year;

// ----------------------------
// 2️⃣ Calculate Days in Month
// ----------------------------
const daysInMonth = new Date(year, month + 1, 0).getDate();
const calendar = document.getElementById("calendar");

// Generate calendar boxes
for (let day = 1; day <= daysInMonth; day++) {
  const dayBox = document.createElement("div");
  dayBox.className = "day";
  dayBox.setAttribute("data-day", day);
  dayBox.innerHTML = `<div class="date">${day}</div>`;
  calendar.appendChild(dayBox);
}

// ----------------------------
// 3️⃣ Fetch Live NOAA Kp Data
// ----------------------------
fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json")
  .then(response => response.json())
  .then(data => {

    data.forEach(entry => {
      const entryDate = new Date(entry.time_tag);
      const kp = parseFloat(entry.kp_index);

      if (
        entryDate.getFullYear() === year &&
        entryDate.getMonth() === month &&
        kp >= 5
      ) {
        const day = entryDate.getDate();
        const dayBox = document.querySelector(`.day[data-day='${day}']`);
        if (dayBox && !dayBox.querySelector(".aurora")) {
          dayBox.innerHTML += `
            <div class="aurora"></div>
            <div class="tooltip">Aurora Likely (Kp ${kp})</div>
          `;
        }
      }
    });

  })
  .catch(error => {
    console.log("NOAA data unavailable", error);
  });

</script>

</body>
</html>
