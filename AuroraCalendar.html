<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Cosmic Calendar Engine</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #05070f, #000);
  color:white;
  padding:20px;
}

h1 {
  text-align:center;
  color:#9ecbff;
  letter-spacing:2px;
}

.info {
  max-width:850px;
  margin:0 auto 25px auto;
  text-align:center;
  color:#cfd8e3;
  font-size:14px;
  line-height:1.6;
}

.nav {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

button {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
}

button:hover {
  background:rgba(120,180,255,0.2);
}

/* ANIMATION */
#calendarWrapper {
  opacity:0;
  transform:translateY(20px);
  transition:0.6s ease;
}

#calendarWrapper.show {
  opacity:1;
  transform:translateY(0);
}

.calendar {
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:12px;
  max-width:1000px;
  margin:0 auto;
}

.day {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:10px;
  min-height:140px;
}

.day:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(120,180,255,0.25);
}

.date {
  font-size:12px;
  color:#aaa;
}

.title {
  font-size:12px;
  margin-top:5px;
  color:#9ecbff;
}

.desc {
  font-size:11px;
  margin-top:5px;
  color:#cfd8e3;
}

.mystical {
  font-size:11px;
  font-style:italic;
  color:#b59cff;
  margin-top:6px;
}

/* 🌕 BLOOD MOON (RED MOON) */
.blood-moon {
  width:18px;
  height:18px;
  background:red;
  border-radius:50%;
  margin:6px auto;
  box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<h1>🌌 Global Cosmic Calendar Engine</h1>

<div class="info">
A hybrid cosmic calendar combining astronomical events and symbolic interpretations.
Meteor showers, eclipses, auroras, and lunar phenomena are mapped across the year.
</div>

<div class="nav">
<button onclick="loadMonth('march')">March</button>
<button onclick="loadMonth('april')">April</button>
</div>

<div id="calendarWrapper">
  <div class="calendar" id="calendar"></div>
</div>

<script>

// 🌌 DATA (RESTORED + BLOOD MOON ADDED)
const dataSets = {

  march: {
    1: { mystical: "Beginning of cosmic transition." },
    3: { aurora: true },
    7: { stars: true, mystical: "Stellar alignment energy peaks." },

    10: { event: "Aurora Activity", aurora: true },

    14: {
      event: "Blood Moon Eclipse",
      bloodMoon: true,
      mystical: "Earth's shadow fully covers the Moon."
    },

    18: { stars: true },

    20: { event: "Equinox Portal", mystical: "Balance of light and darkness." },

    22: { aurora: true },

    25: { mystical: "Residual lunar energy fading." },

    28: { stars: true },

    30: { event: "Cosmic Drift End Cycle", mystical: "Closing of lunar influence cycle." }
  },

  april: {
    1: { mystical: "Spring cosmic reset begins." },
    5: { stars: true },
    10: { aurora: true },
    15: { mystical: "Energetic planetary alignment phase." },
    18: { stars: true },

    22: {
      event: "Lyrids Meteor Shower Peak",
      stars: true,
      mystical: "Swift cosmic renewal and insight."
    },

    25: {
      event: "Post-Lyrid Activity",
      mystical: "Faint residual meteor energy in sky."
    },

    28: { aurora: true }
  }
};

let currentMonth = "march";

// 🌌 ANIMATION SWITCH
function loadMonth(month) {
  currentMonth = month;

  const wrapper = document.getElementById("calendarWrapper");
  wrapper.classList.remove("show");

  setTimeout(() => {
    render(month);
    wrapper.classList.add("show");
  }, 250);
}

// 🌌 RENDER
function render(month) {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const data = dataSets[month] || {};

  for (let i = 1; i <= 30; i++) {
    const d = data[i] || {};

    const div = document.createElement("div");
    div.className = "day";

    let html = `<div class="date">Day ${i}</div>`;

    if (d.event) {
      html += `<div class="title">${d.event}</div>`;
    }

    if (d.bloodMoon) {
      html += `
        <div class="blood-moon"></div>
        <div class="desc">Blood Moon Eclipse</div>
      `;
    }

    if (d.aurora) {
      html += `<div class="desc">Aurora Activity</div>`;
    }

    if (d.stars) {
      html += `<div class="desc">Meteor Activity ✨</div>`;
    }

    if (d.mystical) {
      html += `<div class="mystical">${d.mystical}</div>`;
    }

    div.innerHTML = html;
    calendar.appendChild(div);
  }
}

// INIT
loadMonth("march");

</script>

</body>
</html>
