<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Cosmic Calendar Engine - April</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #05070f, #000);
  color:white;
  padding:20px;
  overflow-x:hidden;
}

/* HEADER */
h1 {
  text-align:center;
  color:#9ecbff;
  letter-spacing:2px;
}

.info {
  max-width:850px;
  margin:0 auto 25px auto;
  text-align:center;
  color:#cfd8e3;
  font-size:14px;
  line-height:1.6;
}

/* MONTH NAV */
.nav {
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

button {
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.2);
  color:white;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  background:rgba(120,180,255,0.2);
}

/* ANIMATION WRAPPER */
#calendarWrapper {
  opacity:0;
  transform:translateY(20px);
  transition:0.6s ease;
}

#calendarWrapper.show {
  opacity:1;
  transform:translateY(0);
}

/* GRID */
.calendar {
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:12px;
  max-width:1000px;
  margin:0 auto;
}

.day {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:10px;
  min-height:120px;
  transition:0.3s;
}

.day:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(120,180,255,0.25);
}

.date {
  font-size:12px;
  color:#aaa;
}

.title {
  font-size:12px;
  margin-top:5px;
  color:#9ecbff;
}

.desc {
  font-size:11px;
  margin-top:5px;
  color:#cfd8e3;
}

.icon {
  font-size:20px;
  margin-top:5px;
}

.mystical {
  font-size:11px;
  font-style:italic;
  color:#b59cff;
  margin-top:6px;
}
</style>
</head>

<body>

<h1>🌌 Global Cosmic Calendar Engine</h1>

<div class="info">
This calendar is a hybrid cosmic system combining known astronomical events and symbolic interpretations.
It reflects recurring celestial phenomena such as meteor showers and seasonal sky activity.
</div>

<div class="nav">
<button onclick="loadMonth('april')">April</button>
<button onclick="loadMonth('march')">March</button>
</div>

<div id="calendarWrapper">
  <div class="calendar" id="calendar"></div>
</div>

<script>
// 🌠 HYBRID APRIL DATA (manual + known astronomy)
const dataSets = {
  april: {
    22: {
      events: [
        {
          name: "Lyrids Meteor Shower Peak",
          icon: "🌠",
          description: "Annual meteor shower caused by Comet Thatcher debris.",
          image: ""
        }
      ],
      mystical: "A night of swift cosmic renewal and sudden insight."
    },
    25: {
      events: [
        {
          name: "Post-Lyrid Sky Activity",
          icon: "✨",
          description: "Residual meteoric dust increases faint shooting stars.",
          image: ""
        }
      ],
      mystical: "A lingering echo of celestial motion."
    },
    1: {
      events: [
        {
          name: "Spring Sky Transition",
          icon: "🌌",
          description: "Seasonal shift in visible constellations begins.",
          image: ""
        }
      ],
      mystical: "A symbolic reset of celestial cycles."
    }
  },

  march: {
    14: {
      events: [
        {
          name: "Waning Moon Peak Influence",
          icon: "🌗",
          description: "Strong lunar phase energy.",
          image: ""
        }
      ],
      mystical: "A time of reflection and closure."
    }
  }
};

let currentMonth = "april";

// 🌌 LOAD MONTH WITH ANIMATION
function loadMonth(month) {
  currentMonth = month;

  const wrapper = document.getElementById("calendarWrapper");
  wrapper.classList.remove("show");

  setTimeout(() => {
    renderCalendar(month);
    wrapper.classList.add("show");
  }, 250);
}

// 🌌 RENDER CALENDAR
function renderCalendar(month) {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const data = dataSets[month] || {};

  for (let i = 1; i <= 30; i++) {
    const dayData = data[i] || {};

    const div = document.createElement("div");
    div.className = "day";

    let html = `<div class="date">Day ${i}</div>`;

    if (dayData.events) {
      for (const ev of dayData.events) {
        html += `
          <div class="icon">${ev.icon}</div>
          <div class="title">${ev.name}</div>
          <div class="desc">${ev.description}</div>
        `;
      }
    }

    if (dayData.mystical) {
      html += `<div class="mystical">${dayData.mystical}</div>`;
    }

    div.innerHTML = html;
    calendar.appendChild(div);
  }
}

// INIT
loadMonth("april");
</script>

</body>
</html>
