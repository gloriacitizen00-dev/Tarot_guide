<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aurora Calendar - March</title>
<style>
  body {
    background-color: white;
    font-family: Arial, sans-serif;
    padding: 20px;
  }
  h1 {
    text-align: center;
    margin-bottom: 20px;
  }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
  }
  .day {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
    min-height: 120px;
    position: relative;
    text-align: center;
  }
  .date {
    font-weight: bold;
    margin-bottom: 5px;
  }
  .event {
    margin-top: 10px;
  }
  .blood-moon {
    width: 40px;
    height: 40px;
    background-color: red;
    border-radius: 50%;
    display: block;
    margin: 0 auto;
  }
  .aurora {
    width: 800px;
    height: 50px;
    background: linear-gradient(180deg, #00ff99, #00ccff);
    border-radius: 50% / 50%;
    display: block;
    margin: 0 auto;
  }
  .stars {
    color: gold;
    font-size: 18px;
    display: block;
  }
  .tooltip {
    font-size: 12px;
    margin-top: 5px;
  }
</style>
</head>
<body>

<h1>Aurora Calendar - March</h1>
<div class="calendar">

  <!-- Days 1–30 -->
  <div class="day"><div class="date">1</div></div>
  <div class="day"><div class="date">2</div></div>

  <!-- March 3 - Blood Moon -->
  <div class="day">
    <div class="date">3</div>
    <div class="event">
      <span class="blood-moon"></span>
      <div class="tooltip">Blood Moon: Partial Eclipse</div>
    </div>
  </div>

  <div class="day"><div class="date">4</div></div>

  <!-- March 5 - Aurora -->
  <div class="day">
    <div class="date">5</div>
    <div class="event">
      <span class="aurora"></span>
      <div class="tooltip">Aurora likely visible in northern regions</div>
    </div>
  </div>

  <div class="day"><div class="date">6</div></div>
  <div class="day"><div class="date">7</div></div>
  <div class="day"><div class="date">8</div></div>
  <div class="day"><div class="date">9</div></div>

  <!-- March 10 - Meteor Shower -->
  <div class="day">
    <div class="date">10</div>
    <div class="event">
      <span class="stars">✨✨</span>
      <div class="tooltip">Lucky Star Shower</div>
    </div>
  </div>

  <div class="day"><div class="date">11</div></div>
  <div class="day"><div class="date">12</div></div>
  <div class="day"><div class="date">13</div></div>
  <div class="day"><div class="date">14</div></div>
  <div class="day"><div class="date">15</div></div>
  <div class="day"><div class="date">16</div></div>
  <div class="day"><div class="date">17</div></div>
  <div class="day"><div class="date">18</div></div>
  <div class="day"><div class="date">19</div></div>
  <div class="day"><div class="date">20</div></div>
  <div class="day"><div class="date">21</div></div>
  <div class="day"><div class="date">22</div></div>
  <div class="day"><div class="date">23</div></div>
  <div class="day"><div class="date">24</div></div>
  <div class="day"><div class="date">25</div></div>
  <div class="day"><div class="date">26</div></div>
  <div class="day"><div class="date">27</div></div>
  <div class="day"><div class="date">28</div></div>
  <div class="day"><div class="date">29</div></div>
  <div class="day"><div class="date">30</div></div>

</div>
</body>
</html>
