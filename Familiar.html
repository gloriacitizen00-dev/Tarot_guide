<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen Familiar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); /* fondo místico */
      font-family: 'Cinzel', serif;
      color: #ffd700;
      text-shadow: 0 0 10px #ff69b4, 0 0 20px #ffd700;
    }
    img {
      max-width: 90%;
      height: auto; /* mantiene proporción */
      border-radius: 12px;
      box-shadow: 0 0 25px #ff69b4;
    }
  </style>
</head>
<body>
  <img src="familiar.png" alt="Imagen familiar mágica">
</body>
</html>
