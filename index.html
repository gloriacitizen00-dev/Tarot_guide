<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maneko Neki – Cover</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center; /* centrado vertical */
      align-items: center;
      background-image: url('hearts.png'), url('First.png');
      background-repeat: repeat, no-repeat;
      background-position: center;
      background-size: 100px, cover; /* corazones a 100px, portada adaptada */
      background-blend-mode: overlay;
      background-color: rgba(242, 184, 197, 0.5);
    }

    nav {
      background: #cc0000; 
      display: flex;
      justify-content: center;
      padding: 1em;
      flex-wrap: wrap;
      position: fixed;
      top: 0;
      width: 100%;
    }

    nav a {
      background: #e60000;
      color: #fff;
      text-decoration: none;
      margin: 0.3em;
      padding: 0.6em 1.2em;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.3s, transform 0.2s; /* faltaba ; */
      display: inline-block; /* asegura que ::after se muestre bien */
    }

    nav a:hover {
      background: #ff1a1a;
      transform: scale(1.05);
    }

    nav a:hover::after,
    nav a:active::after,
    nav a:focus::after {
      content: " ❤️";
      font-size: 1.2em;
      margin-left: 5px;
    }

    button {
      height: 2cm;
      font-size: 2rem;
      padding: 0 20px;
      cursor: pointer;
      border: none;
      border-radius: 12px;
      background-color: rgba(255,255,255,0.9);
      transition: 0.3s;
      margin-top: 100px; /* espacio debajo del menú */
    }

    button:hover {
      background-color: rgba(255,255,255,1);
    }

    footer {
      background: #800000;
      text-align: center;
      padding: 1em;
      position: fixed;
      bottom: 0;
      width: 100%;
      font-size: 0.9em;
      color: #fff;
    }

    /* Ajustes responsivos para pantallas pequeñas */
    @media (max-width: 768px) {
      body {
        background-size: contain; /* mantiene proporción en móviles */
      }
      button {
        font-size: 1.5rem;
        height: auto;
        padding: 10px 15px;
      }
      nav a::after {
        content: " ❤️";
        font-size: 1.2em;
        margin-left: 5px;
      }
    }
  </style>
</head>
<body>
  <nav>
    <a href="about.html">About Us</a>
    <a href="store.html">Tienda en línea</a>
    <a href="game.html">Juego del Tarot</a>
    <a href="subs.html">Subscripciones</a>
    <a href="contact.html">Contáctenos</a>
    <a href="login.html">Login</a>
    <a href="register.html">Register</a>
    <a href="MysticalWeatherCalendar.html">Calendar</a>
  </nav>

  </footer>

    }
  </script>
</body>
</html>
