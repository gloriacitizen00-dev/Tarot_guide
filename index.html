<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Oracle – Main Menu</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background-image: url('https://raw.githubusercontent.com/gloriacitizen00-dev/Tarot_guide/main/First.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    background-color: #f2b8c5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER MENU */
  header {
    width: 100%;
    background-color: #ff1a1a; /* fondo rojo potente */
    display: flex;
    justify-content: center; /* horizontal center */
    padding: 10px 0;
  }

  header a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 1.2rem;
    margin: 0 10px;
    padding: 8px 15px;
    border-radius: 5px;
    transition: all 0.3s ease;
    background-color: #cc0000; /* botón rojo */
  }

  header a:hover {
    background-color: #ff4d4d;
    transform: scale(1.1);
  }

  header a::after {
    content: " ❤️";
    font-size: 1.2em;
    opacity: 0;
    transition: opacity 0.3s;
  }

  header a:hover::after {
    opacity: 1;
  }

  /* NEXT BUTTON */
  #nextBtn {
    margin-top: 40px;
    padding: 15px 30px;
    font-size: 1.5rem;
    border: none;
    border-radius: 10px;
    background-color: #ff1a1a;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  #nextBtn:hover {
    background-color: #ff4d4d;
    transform: scale(1.1);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header {
      flex-wrap: wrap;
    }
    header a {
      font-size: 1.3rem;
      margin: 5px;
    }
    #nextBtn {
      font-size: 1.7rem;
      padding: 15px 25px;
    }
  }
</style>
</head>
<body>

<header>
  <a href="Aboutus.html">About Us</a>
  <a href="shopping.html">Online Store</a>
  <a href="game.html">Tarot Game</a>
  <a href="Subscriptions.html">Subscriptions</a>
  <a href="subs.html">Subscriptions</a>
  <a href="Contact.html">Contact</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="cosmic_console.html">Cosmic Console</a>
</header>

<button id="nextBtn" onclick="window.location.href='game.html'">Next</button>

</body>
</html>
