<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Oracle – Main Menu</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
    background-image: url('https://raw.githubusercontent.com/gloriacitizen00-dev/Tarot_guide/main/First.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    background-color: #f2b8c5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER MENU */
  header {
    width: 100%;
    background-color: #ff1a1a;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 0;
  }

  header a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 1.4rem; /* 2 cm bigger */
    margin: 5px;
    padding: 10px 18px; /* more padding for bigger buttons */
    border-radius: 5px;
    transition: all 0.3s ease;
    background-color: #cc0000;
    text-align: center;
    max-width: 100%;
  }

  header a:hover {
    background-color: #ff4d4d;
    transform: scale(1.05);
  }

  header a::after {
    content: " ❤️";
    font-size: 1.1em;
    opacity: 0;
    transition: opacity 0.3s;
  }

  header a:hover::after {
    opacity: 1;
  }

  /* NEXT BUTTON CENTERED */
  #nextBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 35px;
    font-size: 1.5rem;
    border: none;
    border-radius: 10px;
    background-color: #ff1a1a;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    max-width: 90%;
  }

  #nextBtn:hover {
    background-color: #ff4d4d;
    transform: translate(-50%, -50%) scale(1.05);
  }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header a {
      flex: 1 1 45%;
      font-size: 1.2rem; /* slightly smaller on phone */
      padding: 8px 12px;
    }
    #nextBtn {
      font-size: 1.3rem;
      padding: 12px 25px;
    }

   .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .popup img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(212,175,55,0.6);
   }
  }
</style>
</head>
<body>

<header>

 <div class="overlay" id="introPopup">
    <div class="popup">
      <img src="tarotguide.png" alt="Tarot Guide Intro">
    </div>
  </div>
 
  <a href="Aboutus.html">About Us</a>
  <a href="Spreads.html">Spreads</a>
  <a href="game.html">Rituals</a>
  <a href="shopping.html">Online Store</a>
  <a href="subs.html">Subscriptions</a>
  <a href="Contact.html">Contact</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="Cosmic_console.html">Cosmic Console</a>
  <a href="MysticalWeatherCalendar.html">W-Calendar</a>
  <a href="AuroraCalendar.html">Aurora Calendar</a>
</header>

<button id="nextBtn" onclick="window.location.href='game.html'">Next</button>
 
<script>
 if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker registered'))
    .catch(err => console.log('Service Worker registration failed:', err));
}

 setTimeout(function() {
      document.getElementById('introPopup').style.display = 'none';
    }, 6000); // hides after 6 seconds
 
</script>
</body>
</html>
