<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Oracle – Main Menu</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: Arial, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    justify-content: center; /* centrado vertical */
    align-items: center;
    background-image: url('https://raw.githubusercontent.com/gloriacitizen00-dev/Tarot_guide/main/First.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain; /* adapta la imagen */
    background-color: #f2b8c5;
    text-align: center;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-bottom: 50px;
  }

  nav a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 1.2rem;
    position: relative;
    transition: all 0.3s ease;
    padding: 5px 10px;
    border-radius: 5px;
  }

  nav a:hover {
    background-color: #ff1a1a;
    transform: scale(1.05);
  }

  nav a:hover::after {
    content: " ❤️";
    font-size: 1.2em;
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 1.3rem;
    border: none;
    border-radius: 10px;
    background-color: rgba(255,255,255,0.7);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  button:hover {
    background-color: rgba(255,255,255,1);
  }

  /* Responsivo para pantallas pequeñas */
  @media (max-width: 768px) {
    body {
      background-size: contain;
    }
    nav {
      flex-direction: column;
      gap: 10px;
    }
    nav a {
      font-size: 1.5rem;
      padding: 10px 15px;
    }
    button {
      font-size: 1.5rem;
      padding: 10px 15px;
    }
  }
</style>
</head>
<body>

<h1>Digital Oracle – Main Menu</h1>

<nav>
  <a href="Aboutus.html">About Us</a>
  <a href="shopping.html">Tienda en línea</a>
  <a href="game.html">Juego del Tarot</a>
  <a href="Subscriptions.html">Subscripciones</a>
  <a href="subs.html">Subscripciones</a>
  <a href="Contact.html">Contáctenos</a>
  <a href="login.html">Login</a>
  <a href="register.html">Register</a>
  <a href="cosmic_console.html">Cosmic Console</a>
</nav>

<!-- Opcional: botón grande extra -->
<button onclick="window.location.href='game.html'">Jugar Tarot</button>

</body>
</html>
