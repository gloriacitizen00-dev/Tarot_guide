<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cosmic Console – Digital Oracle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0c10;
      color: #c5c6c7;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .oracle {
      margin: 2em auto;
      padding: 2em;
      background: #1f2833;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 0 20px #45a29e;
      text-align: center;
    }

    .message {
      font-size: 1.2em;
      color: #66fcf1;
    }

    .data {
      margin-top: 1em;
      font-size: 0.9em;
      color: #45a29e;
    }
  </style>
</head>
<body>
  <h1>Cosmic Console</h1>

  <!-- Bloque Digital Oracle -->
  <div class="oracle">
    <p class="message" id="oracleMessage">Consultando señales cósmicas...</p>
    <div class="data" id="oracleData">Cargando datos...</div>
  </div>

  <script>
    async function loadSpaceWeather() {
      try {
        const response = await fetch("https://services.swpc.noaa.gov/json/planetary_k_index_1m.json");
        const data = await response.json();

        // Último valor Kp en tiempo real
        const kpIndex = data[data.length - 1].kp_index;
        const plasmaDensity = 5.2; // placeholder, luego otra API para densidad real

        // Mensajes posibles
        const positiveMessages = [
          "✨ La estabilidad te rodea. El cosmos ofrece claridad.",
          "🌌 Los cielos calmos guían tu camino hoy.",
          "🔮 La previsibilidad reina — confía en el progreso constante."
        ];

        const negativeMessages = [
          "⚡ La turbulencia se eleva. El caos transforma tu sendero.",
          "🌑 Las tormentas ponen a prueba tu resiliencia — la transformación te espera.",
          "🔥 El cosmos está inquieto. Prepárate para el cambio."
        ];

        // Selección de mensaje según condiciones
        let messagePool;
        if (kpIndex <= 3 && plasmaDensity < 6) {
          messagePool = positiveMessages;
        } else {
          messagePool = negativeMessages;
        }

        // Escoger mensaje aleatorio
        const message = messagePool[Math.floor(Math.random() * messagePool.length)];
        document.getElementById("oracleMessage").textContent = message;

        // Calcular índices
        const reliabilityIndex = Math.max(0, 100 - kpIndex * 10);
        const chaosIndex = kpIndex * 15 + plasmaDensity;

        // Mostrar datos reales
        document.getElementById("oracleData").textContent =
          "Plasma Density: " + plasmaDensity + " TEC | " +
          "Kp Index: " + kpIndex + " | " +
          "Reliability Index: " + reliabilityIndex + "% | " +
          "Chaos Index: " + chaosIndex.toFixed(1);
      } catch (error) {
        document.getElementById("oracleMessage").textContent = "Error consultando datos cósmicos.";
      }
    }

    loadSpaceWeather();
  </script>
</body>
</html>
