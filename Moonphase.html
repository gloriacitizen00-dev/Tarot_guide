<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Phase Live</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

h1 {
  color:#cfe3ff;
  margin-bottom:10px;
}

#date {
  color:#888;
  margin-bottom:20px;
}

canvas {
  border-radius:50%;
  box-shadow:0 0 50px rgba(200,220,255,0.4);
}

#phaseText {
  margin-top:20px;
  font-size:20px;
}
</style>
</head>

<body>

<h1 id="title">Loading...</h1>
<div id="date"></div>

<canvas id="moon" width="260" height="260"></canvas>

<div id="phaseText">Calculating moon phase...</div>

<script>
// 🌙 REAL MOON PHASE CALCULATION
function getMoonPhase() {
  const synodicMonth = 29.53058867;
  const knownNewMoon = new Date("2000-01-06T18:14:00Z");

  const now = new Date();
  const diff = now - knownNewMoon;

  const days = diff / (1000 * 60 * 60 * 24);
  const phase = days % synodicMonth;

  if (phase < 1.845) return "New Moon";
  if (phase < 5.536) return "Waxing Crescent";
  if (phase < 9.228) return "First Quarter";
  if (phase < 12.919) return "Waxing Gibbous";
  if (phase < 16.61) return "Full Moon";
  if (phase < 20.302) return "Waning Gibbous";
  if (phase < 23.993) return "Last Quarter";
  return "Waning Crescent";
}

// 🌙 DRAW REALISTIC MOON (NO IMAGES NEEDED)
function drawMoon(phase) {
  const canvas = document.getElementById("moon");
  const ctx = canvas.getContext("2d");

  const w = canvas.width;
  const h = canvas.height;
  const r = w / 2.5;

  ctx.clearRect(0, 0, w, h);

  // background glow
  ctx.fillStyle = "rgba(200,220,255,0.08)";
  ctx.beginPath();
  ctx.arc(w/2, h/2, r*1.2, 0, Math.PI*2);
  ctx.fill();

  // base moon (light side)
  ctx.fillStyle = "#d9d9d9";
  ctx.beginPath();
  ctx.arc(w/2, h/2, r, 0, Math.PI*2);
  ctx.fill();

  // shadow overlay (realistic phase mask)
  ctx.fillStyle = "black";
  ctx.beginPath();

  let shift = 0;

  switch(phase) {
    case "New Moon": shift = 0; break;
    case "Waxing Crescent": shift = -r*0.6; break;
    case "First Quarter": shift = -r; break;
    case "Waxing Gibbous": shift = -r*1.4; break;
    case "Full Moon": shift = -1000; break;
    case "Waning Gibbous": shift = r*1.4; break;
    case "Last Quarter": shift = r; break;
    case "Waning Crescent": shift = r*0.6; break;
  }

  if (phase === "Full Moon") {
    // no shadow
    return;
  }

  ctx.arc(w/2 + shift, h/2, r, 0, Math.PI*2);
  ctx.fill();
}




// 🌙 MAIN FUNCTION
function loadMoon() {
  const phase = getMoonPhase();

  document.getElementById("title").textContent = phase;
  document.getElementById("date").textContent = new Date().toDateString();
  document.getElementById("phaseText").textContent = "Live calculated lunar cycle";

  drawMoon(phase);
}

// RUN
loadMoon();
</script>

</body>
</html>
