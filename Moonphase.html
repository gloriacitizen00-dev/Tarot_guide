<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moon Phase Live</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

h1 {
  margin-bottom:10px;
  color:#cfe3ff;
  letter-spacing:2px;
}

#date {
  color:#888;
  margin-bottom:30px;
}

.moon {
  width:250px;
  height:250px;
  border-radius:50%;
  box-shadow:0 0 40px rgba(200,220,255,0.4);
  transition:1s ease;
}

.phase {
  margin-top:20px;
  font-size:22px;
  color:#ffffff;
}

.glow {
  animation: pulse 3s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 30px rgba(200,220,255,0.3); }
  50% { box-shadow:0 0 60px rgba(200,220,255,0.7); }
  100% { box-shadow:0 0 30px rgba(200,220,255,0.3); }
}
</style>
</head>

<body>

<h1 id="title">Loading Moon...</h1>
<div id="date"></div>

<img id="moon" class="moon glow" src="">

<div class="phase" id="phaseText"></div>

<script>
// 🌙 REAL MOON PHASE CALCULATION (NO API)
function getMoonPhase() {
  const synodicMonth = 29.53058867;

  // Known New Moon reference (2000-01-06)
  const knownNewMoon = new Date("2000-01-06T18:14:00Z");

  const now = new Date();
  const diff = now - knownNewMoon;

  const days = diff / (1000 * 60 * 60 * 24);
  const phase = days % synodicMonth;

  if (phase < 1.845) return "New Moon";
  if (phase < 5.536) return "Waxing Crescent";
  if (phase < 9.228) return "First Quarter";
  if (phase < 12.919) return "Waxing Gibbous";
  if (phase < 16.61) return "Full Moon";
  if (phase < 20.302) return "Waning Gibbous";
  if (phase < 23.993) return "Last Quarter";
  return "Waning Crescent";
}

// 🌙 IMAGE MAP
const images = {
  "New Moon": "https://upload.wikimedia.org/wikipedia/commons/0/0d/New_Moon.jpg",
  "Waxing Crescent": "https://upload.wikimedia.org/wikipedia/commons/3/3c/Waxing_crescent_moon.jpg",
  "First Quarter": "https://upload.wikimedia.org/wikipedia/commons/9/9e/First_quarter_moon.jpg",
  "Waxing Gibbous": "https://upload.wikimedia.org/wikipedia/commons/6/6a/Waxing_gibbous_moon.jpg",
  "Full Moon": "https://upload.wikimedia.org/wikipedia/commons/5/5c/FullMoon2010.jpg",
  "Waning Gibbous": "https://upload.wikimedia.org/wikipedia/commons/8/8c/Waning_gibbous_moon.jpg",
  "Last Quarter": "https://upload.wikimedia.org/wikipedia/commons/e/e1/Last_quarter_moon.jpg",
  "Waning Crescent": "https://upload.wikimedia.org/wikipedia/commons/5/5f/Waning_crescent_moon.jpg"
};

// 🌙 MAIN FUNCTION
function loadMoon() {
  const phase = getMoonPhase();

  document.getElementById("title").textContent = phase;

  document.getElementById("date").textContent =
    new Date().toDateString();

  document.getElementById("phaseText").textContent =
    "Live lunar cycle (calculated locally)";

  const moonImg = document.getElementById("moon");

moonImg.src = images[phase] || images["Full Moon"];

moonImg.onerror = function () {
  moonImg.src = "https://upload.wikimedia.org/wikipedia/commons/5/5c/FullMoon2010.jpg";
};

// RUN
loadMoon();

// optional refresh every hour (not required but safe)
setInterval(loadMoon, 3600000);
</script>

</body>
</html>
