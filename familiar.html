<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Familiar's Guidance</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..700&family=Bodoni+Moda:wght@400..700&display=swap" rel="stylesheet">

<style>
  body { 
    font-family: 'Bodoni Moda', serif;
    margin: 0;
    min-height: 100vh;
    background-color: #ffffff;
    color: #000;
  }

  .content {
    max-width: 1100px;
    margin: 60px auto;
    padding: 20px;
    text-align: center;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 48px;
    margin-bottom: 30px;
  }

  .instructions {
    font-size: 20px;
    margin-bottom: 25px;
    line-height: 1.5;
  }

  .row-title {
    font-size: 18px;
    font-weight: bold;
    margin: 20px 0 10px 0;
    color: #000;
  }

  .row { 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    margin-bottom: 20px; 
    flex-wrap: wrap;
  }

  .card { 
    width: 120px; 
    text-align: center;
  }

  .card img { 
    width: 120px; 
    height: 180px;
    object-fit: cover; 
    border-radius: 6px; 
    border: 2px solid #000;
  }

  .card-name { 
    margin-top: 6px; 
    font-weight: bold; 
    font-size: 0.9em;
    color: #000;
  } 

  .text-area {
    margin-top: 20px;
    font-size: 18px;
    color: #000;
  }

  .buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
  }

  .btn { 
    padding: 14px 35px;
    font-size: 1.1em;
    border-radius: 30px;
    cursor: pointer;
    background-color: #000;
    color: #fff;
    border: none;
    transition: all 0.25s ease;
  }

  .btn:hover {
    background-color: #333;
    transform: scale(1.05);
  }

  @media (max-width: 768px) {
    h1 { font-size: 36px; }
    .instructions { font-size: 18px; }
  }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    .btn { width: 100%; }
    .card { width: 45%; }
  }
</style>
</head>

<body>

<div class="content">

  <h1>The Familiar's Guidance</h1>

  <div class="instructions">
    Welcome to your tarot reading with your beloved familiar! 🐱<br>
    Observe the cards and let intuition guide you.
  </div>

  <div class="row-title">Fortune Paws — your current situation</div>
  <div class="row" id="top-row"></div>

  <div class="row-title">Meowing Guidance — what’s to come</div>
  <div class="row" id="bottom-row"></div>

  <div class="text-area" id="reading-text">
    Your familiar purrs softly...  
    Let the cards speak to you.
  </div>

  <div class="buttons">
    <button class="btn" onclick="navigate(true)">Go to Store</button>
    <button class="btn" onclick="navigate(false)">Back to Menu</button>
  </div>

</div>

<script>
const MajorArcana = [
  { name: "The Fool", src: "images/MajorArcana/TheFool.png" },
  { name: "The Magician", src: "images/MajorArcana/TheMagician.png" },
  { name: "The High Priestess", src: "images/MajorArcana/TheHighPriestess.png" },
  { name: "The Empress", src: "images/MajorArcana/TheEmpress.png" },
  { name: "The Emperor", src: "images/MajorArcana/TheEmperor.png" },
  { name: "The Lovers", src: "images/MajorArcana/TheLovers.png" },
  { name: "The Chariot", src: "images/MajorArcana/TheChariot.png" },
  { name: "The Strength", src: "images/MajorArcana/TheStrength.png" },
  { name: "The Hermit", src: "images/MajorArcana/TheHermit.png" },
  { name: "The Wheel of Fortune", src: "images/MajorArcana/TheWheelofFortune.png" },
  { name: "The Justice", src: "images/MajorArcana/TheJustice.png" },
  { name: "The Hanged Man", src: "images/MajorArcana/TheHangedMan.png" },
  { name: "The Death", src: "images/MajorArcana/TheDeath.png" },
  { name: "The Temperance", src: "images/MajorArcana/TheTemperance.png" },
  { name: "The Devil", src: "images/MajorArcana/TheDevil.png" },
  { name: "The Tower", src: "images/MajorArcana/TheTower.png" },
  { name: "The Star", src: "images/MajorArcana/TheStar.png" },
  { name: "The Moon", src: "images/MajorArcana/TheMoon.png" },
  { name: "The Sun", src: "images/MajorArcana/TheSun.png" },
  { name: "The Judgement", src: "images/MajorArcana/TheJudgement.png" },
  { name: "The World", src: "images/MajorArcana/TheWorld.png" }
];

const ranks = ["Ace","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Page","Knight","Queen","King"];

const Cups = ranks.map(n => ({ name:`${n} of Cups`, src:`images/Cups/${n}OfCups.png` }));
const Pentacles = ranks.map(n => ({ name:`${n} of Pentacles`, src:`images/pentacles/${n}OfPentacles.png` }));
const Swords = ranks.map(n => ({ name:`${n} of Swords`, src:`images/swords/${n}OfSwords.png` }));
const Wands = ranks.map(n => ({ name:`${n} of Wands`, src:`images/wands/${n}OfWands.png` }));

const MinorArcana = [...Cups, ...Pentacles, ...Swords, ...Wands];

const params = new URLSearchParams(window.location.search);
const deckChoice = (params.get("deck") || "mixed").toLowerCase();

let deck;
if (deckChoice === "major") deck = [...MajorArcana];
else if (deckChoice === "minor") deck = [...MinorArcana];
else deck = [...MajorArcana, ...MinorArcana];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

const selectedCards = shuffle(deck).slice(0, 8);

const topRow = document.getElementById("top-row");
const bottomRow = document.getElementById("bottom-row");

selectedCards.forEach((card, index) => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${card.src}" alt="${card.name}">
    <div class="card-name">${card.name}</div>
  `;

  if (index < 4) topRow.appendChild(div);
  else bottomRow.appendChild(div);
});

function navigate(choice) {
  window.location.href = choice ? "shopping.html" : "index.html";
}
</script>

</body>
</html>
