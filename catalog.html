<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Shopping Center Catalog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: #ff1a1a;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 10px 0;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
      border-bottom: 4px solid gold;
    }

    header a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      margin: 5px;
      padding: 10px 18px;
      border-radius: 5px;
      transition: all 0.3s ease;
      background-color: #cc0000;
      text-align: center;
    }

    header a:hover {
      background-color: #ff4d4d;
      transform: scale(1.05);
    }
    
      .cart-icon {
      position: fixed;
      top: 15px;
      right: 20px;
      font-size: 20px;
      z-index: 110;
      cursor: pointer;
      color: white;
    }

    .catalog {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 30px;
      margin-top: 100px;
      width: 100%;
    }

.product {
      background: white;
      border: 3px solid gold; 
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0px 3px 6px rgba(0,0,0,0.2);
      width: 300px;
      transition: transform 0.2s;
    }

    .product:hover { 
      transform: scale(1.05); 
      box-shadow: 0 0 15px gold;            
    }

    .product img {
      width: 100%;
      height: 250px;
      object-fit: contain;
      border-radius: 8px;
      background-color: white;
    }

     .open-product-modal-btn {
       background-color: #ffd700; /* yellow */
      color: black;
      border: 2px solid gold;
      border-radius: 20px;
      padding: 10px 15px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
     }

    .open-product-modal-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }  
    .btn-yes { background-color: #4CAF50; color: white; }
    .btn-no { background-color: #f44336; color: white; }
    .btn-add { background-color: #6a5acd; color: white; }
    .btn-delete { background-color: #ff5555; color: white; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">Go Back Home</a>
    <a href="cosmic-calendar.html">Cosmic Calendar</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </header>
  
  <div class="cart-icon">
    🛒 <span id="cart-count">0</span>
  </div>

  <!-- Catalog wrapper -->
  <div class="catalog">
    <!-- Product 1 -->
    <div class="product"
         data-id="ebook1"
         data-name="Tarot Guide Ebook"
         data-description="This ebook teaches you a unique way to communicate with the stars through the insight of your feline companion..."
         data-price="6.99"
         data-images="Ebook.png,ebook2.JPG,ebook3.JPG">
      <img class="product-image" src="Ebook.png" alt="Tarot Guide Ebook">
      <button class="open-product-modal-btn">Complete tarot interpretation guide</button>
    </div>

    <!-- Product 2 -->
    <div class="product"
         data-name="Tarot Deck"
         data-description="Download all 78 cards from a beautifully illustrated tarot deck..."
         data-price="7.99"
         data-images="cards_mockup.png,cards2.JPG,card3.JPG,card4.JPG">
      <img class="product-image" src="cards_mockup.png" alt="Tarot Deck">
      <button class="open-product-modal-btn">Illustrated tarot deck</button>
    </div>

    <!-- Product 3 -->
    <div class="product"
         data-name="Papel Ecologico"
         data-description="Eco-friendly paper made from sugarcane fiber..."
         data-price="2.00 per sheet"
         data-images="Seven.JPG,paper3.png">
      <img class="product-image" src="Seven.JPG" alt="Eco Paper">
      <button class="open-product-modal-btn">Eco-friendly paper sheets</button>
    </div>
  </div> <!-- end catalog -->

  <!-- Product Modal with carousel -->
  <div id="product-modal" class="modal">
    <div class="modal-content">
      <div style="position: relative;">
        <button id="prev-image" style="position:absolute; left:0; top:50%; transform:translateY(-50%); font-size:20px;">&#8592;</button>
        <img id="carousel-image" src="Ebook.png" style="width:100%; height:300px; object-fit:contain; border-radius:8px; background:white;">
        <button id="next-image" style="position:absolute; right:0; top:50%; transform:translateY(-50%); font-size:20px;">&#8594;</button>
      </div>
      <p id="product-description" style="margin-top:10px;"></p>
      <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
        <label for="modal-quantity">Quantity:</label>
        <select id="modal-quantity">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <button id="add-to-cart" class="btn-add">Add to Cart</button>
      </div>
      <button id="close-product-modal" class="btn-no" style="margin-top:10px;">Close</button>
    </div>
  </div>

  <!-- Cart Modal -->
  <div id="cart-modal" class="modal">
    <div class="modal-content">
      <h3>Your cart</h3>
      <div id="cart-items"></div>
      <button id="close-cart" class="btn-no">Close</button>
      <button id="go-payment" class="btn-yes">Go to Payment</button>
    </div>
  </div>

  <!-- Gallery Modal -->
  <div id="gallery-modal" class="modal">
    <div class="modal-content">
      <img id="main-image" src="" style="width:100%; border-radius:10px;">
      <div id="thumbnail-container" style="display:flex; gap:10px; margin-top:10px; justify-content:center;"></div>
      <button onclick="closeGallery()" class="btn-no">Close</button>
    </div>
  </div>
</body>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || {};
const products = document.querySelectorAll('.product');
const cartCount = document.getElementById('cart-count');

// --- Cart Modal ---
const cartModal = document.getElementById('cart-modal');
const cartItemsDiv = document.getElementById('cart-items');
const closeCartBtn = document.getElementById('close-cart');
const goPaymentBtn = document.getElementById('go-payment');

// --- Product Modal Carousel ---
const productModal = document.getElementById('product-modal');
const carouselImage = document.getElementById('carousel-image');
const productDescription = document.getElementById('product-description');
const quantitySelect = document.getElementById('quantity');
const addToCartBtn = document.getElementById('add-to-cart');
const closeProductModal = document.getElementById('close-product-modal');
const prevBtn = document.getElementById('prev-image');
const nextBtn = document.getElementById('next-image');

let selectedProduct = null;
let images = [];
let currentImageIndex = 0;

document.querySelectorAll('.open-product-modal-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const product = btn.closest('.product');
    selectedProduct = product.dataset.name;
    productDescription.textContent = product.dataset.description;

    images = product.dataset.images ? product.dataset.images.split(',') : [product.querySelector('.product-image').src];
    currentImageIndex = 0;
    carouselImage.src = images[currentImageIndex];

    productModal.style.display = 'flex';
  });
});

// --- Update cart count ---
function updateCartCount() {
  let totalCount = Object.values(cart).reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = totalCount;
}
updateCartCount();

// --- Open product modal on click ---
products.forEach(product => {
  product.addEventListener('click', (e) => {
    if (e.target.classList.contains('product-image')) return;

    selectedProduct = product.dataset.name;
    productDescription.textContent = product.dataset.description;

    images = product.dataset.images ? product.dataset.images.split(',') : [product.querySelector('.product-image').src];
    currentImageIndex = 0;
    carouselImage.src = images[currentImageIndex];

    productModal.style.display = 'flex';
  });
});

// --- Carousel navigation ---
prevBtn.addEventListener('click', () => {
  currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
  carouselImage.src = images[currentImageIndex];
});
nextBtn.addEventListener('click', () => {
  currentImageIndex = (currentImageIndex + 1) % images.length;
  carouselImage.src = images[currentImageIndex];
});

// --- Add to cart from modal ---
addToCartBtn.addEventListener('click', () => {
  const quantity = parseInt(quantitySelect.value);
  const productElement = Array.from(products).find(p => p.dataset.name === selectedProduct);
  const price = parseFloat(productElement.dataset.price);

  if(cart[selectedProduct]) {
    cart[selectedProduct].quantity += quantity;
  } else {
    cart[selectedProduct] = { quantity: quantity, price: price };
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  updateCartCount();
  productModal.style.display = 'none';
});

// --- Close product modal ---
closeProductModal.addEventListener('click', () => {
  productModal.style.display = 'none';
});

// --- Open cart modal ---
document.querySelector('.cart-icon').addEventListener('click', () => {
  cartItemsDiv.innerHTML = '';
  for (let key in cart) {
    const item = cart[key];
    const subtotal = item.quantity * item.price;

    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `
      <span>${key} (Quantity: ${item.quantity}) - $${subtotal.toFixed(2)}</span>
      <button class="btn-delete" data-product="${key}">Delete</button>
    `;
    cartItemsDiv.appendChild(div);
  }
  cartModal.style.display = 'flex';
});

// --- Close cart modal ---
closeCartBtn.addEventListener('click', () => {
  cartModal.style.display = 'none';
});

// --- Go to payment ---
goPaymentBtn.addEventListener('click', () => {
  cartModal.style.display = 'none';
  window.location.href = 'payment.html';
});

// --- Delete item from cart ---
cartItemsDiv.addEventListener('click', (e) => {
  if(e.target.classList.contains('btn-delete')) {
    const product = e.target.dataset.product;
    delete cart[product];
    localStorage.setItem('cart', JSON.stringify(cart));
    updateCartCount();
    e.target.parentElement.remove();
  }
});
</script>
</body>
</html>
